edition = "2023";

package embeddings;
import "google/protobuf/go_features.proto";

option go_package = "github.com/antflydb/antfly/lib/embeddings";
option features.(pb.go).api_level = API_OPAQUE;

message TermiteEmbeddingRequest {
  bytes model_config = 1;
  repeated string input = 2;
}

message FloatArray {
  repeated float values = 1;
}

message TermiteEmbeddingResponse {
  repeated FloatArray embeddings = 1;
}
