# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: common
generate:
  models: true
  embedded-spec: true
compatibility:
  always-prefix-enum-values: true
output: config.gen.go
output-options:
  skip-prune: true
  prefer-skip-optional-pointer: true
  prefer-skip-optional-pointer-with-omitzero: true
import-mapping:
  ../../lib/middleware/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/middleware
  ../../lib/embeddings/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/embeddings
  ../../lib/ai/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/ai
  ../../../generating/openapi.yaml: github.com/antflydb/antfly/go/pkg/generating
  ../../lib/audio/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/audio
  ../../lib/reranking/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/reranking
  ../../lib/chunking/openapi.yaml: github.com/antflydb/antfly/go/pkg/antfly/lib/chunking
  ../../../libaf/logging/openapi.yaml: github.com/antflydb/antfly/go/pkg/libaf/logging
  ../../../libaf/scraping/openapi.yaml: github.com/antflydb/antfly/go/pkg/libaf/scraping
  ../../../termite/openapi.yaml: github.com/antflydb/antfly/go/pkg/termite
