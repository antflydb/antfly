apiVersion: v1
kind: Namespace
metadata:
  name: antfly-gke-spot
---
apiVersion: antfly.io/v1
kind: AntflyCluster
metadata:
  name: antfly-gke-spot-cluster
  namespace: antfly-gke-spot
spec:
  image: ghcr.io/antflydb/antfly:latest
  imagePullPolicy: IfNotPresent

  # GKE Autopilot configuration with Spot Pods for cost optimization
  gke:
    autopilot: true
    autopilotComputeClass: "autopilot-spot"  # Use autopilot-spot for up to 71% cost savings
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1  # Allow 1 pod to be unavailable during disruptions

  metadataNodes:
    replicas: 3
    # Do NOT use useSpotPods with Autopilot - compute class applies to all pods
    # Note: autopilot-spot affects both metadata and data nodes
    metadataAPI: {}
    metadataRaft: {}
    resources:
      cpu: "500m"
      memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

  dataNodes:
    replicas: 5
    # Do NOT use useSpotPods with Autopilot - compute class applies to all pods
    api: {}
    raft: {}
    resources:
      cpu: "1000m"
      memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

    # Optional: Enable autoscaling with Spot Pods
    autoScaling:
      enabled: true
      minReplicas: 3
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
      targetMemoryUtilizationPercentage: 80
      scaleUpCooldown: 60s
      scaleDownCooldown: 300s

  storage:
    storageClass: "standard-rwo"
    metadataStorage: "1Gi"
    dataStorage: "10Gi"

  config: |
    {
      "log": {
        "level": "info",
        "style": "json"
      },
      "cache_size": 1000,
      "enable_metrics": true,
      "max_shard_size_bytes": 134217728,
      "raft_snapshot_threshold": 10000,
      "replication_factor": 3
    }
