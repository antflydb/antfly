# Example Antfly configuration using secrets from encrypted keystore
#
# Before using this config:
# 1. Create keystore: antfly keystore create
# 2. Add secrets:
#    antfly keystore add aws.access_key_id
#    antfly keystore add aws.secret_access_key
#    antfly keystore add openai.api_key
#
# Run with:
#    ANTFLY_KEYSTORE_PASSWORD="your-password" antfly swarm --config configs/config-secrets-example.yaml
#
# See docs/secrets.md for complete documentation

# Storage configuration with S3 credentials from keystore
storage:
  keyvalue: s3
  s3:
    endpoint: s3.amazonaws.com
    region: us-east-1
    bucket: antfly-production-data
    prefix: cluster-1/
    use_ssl: true

    # Credentials from keystore (recommended)
    # These fields are resolved to environment variables at startup
    # They don't exist in the S3Info struct for security reasons
    access_key_id: ${secret:aws.access_key_id}
    secret_access_key: ${secret:aws.secret_access_key}

# Table with embedding enricher using API key from keystore
tables:
  - name: documents
    shards: 3
    replication_factor: 3
    indexes:
      # Full-text search index
      - type: full_text
        name: fulltext
        config:
          field: content

      # Vector embedding index with OpenAI
      - type: embedding_enricher
        name: embeddings
        config:
          provider: openai
          # API key securely stored in keystore
          api_key: ${secret:openai.api_key}
          model: text-embedding-3-small
          field: content
          output_field: embedding
          dimensions: 1536

      # Vector similarity search
      - type: embeddings
        name: vector_search
        config:
          field: embedding
          dimensions: 1536

  - name: articles
    shards: 2
    replication_factor: 3
    indexes:
      # Hybrid search with multiple providers
      - type: full_text
        name: fulltext
        config:
          field: text

      - type: embedding_enricher
        name: embed_openai
        config:
          provider: openai
          api_key: ${secret:openai.api_key}
          model: text-embedding-3-large
          field: text
          output_field: embedding
          dimensions: 3072

      - type: summarize_enricher
        name: summarizer
        config:
          provider: anthropic
          # Anthropic API key from keystore
          api_key: ${secret:anthropic.api_key}
          model: claude-3-haiku-20240307
          field: text
          output_field: summary

      - type: embeddings
        name: vector_search
        config:
          field: embedding
          dimensions: 3072

# Logging
log_level: info
log_style: json

# Data directory
data_dir: /var/lib/antfly

# CORS configuration
cors:
  enabled: true
  allowed_origins:
    - "https://app.example.com"
  allow_credentials: true

# Content security for link summarization
content_security:
  block_private_ips: true
  max_download_size_bytes: 104857600 # 100MB
  download_timeout_seconds: 30
  max_image_dimension: 2048
