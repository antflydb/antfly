# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - ./scripts/completions.sh
    - go mod tidy
    - go generate ./...

builds:
  # Go fallback build for platforms without the Zig runtime.
  - env:
      - CGO_ENABLED=0
      - GOEXPERIMENT=simd
    tags:
      - afrelease
    goos:
      - windows
    id: "antfly-go-windows"
    main: ./cmd/antfly
    binary: antfly-go
    ignore:
      - goarch: "386"

  # Default Zig Antfly runtime builds
  - id: "antfly-linux"
    builder: zig
    dir: ./zig
    binary: antfly
    targets:
      - x86_64-linux-gnu
      - aarch64-linux-gnu
    flags:
      - -Doptimize=ReleaseFast
      - -Dcpu=baseline
      - -Dantfly-bin-name=antfly
      - -Dantfly-version={{ .Version }}
      - -Donnx=false
      - -Dmlx=false
      - -Dmetal=false
      - -Dsystem-blas=false
      - install-antfly

  - id: "antfly-darwin-arm64"
    builder: zig
    dir: ./zig
    binary: antfly
    targets:
      - aarch64-macos
    flags:
      - -Doptimize=ReleaseFast
      - -Dcpu=baseline
      - -Dantfly-bin-name=antfly
      - -Dantfly-version={{ .Version }}
      - -Donnx=false
      - -Dmlx=false
      - -Dmetal=true
      - -Dsystem-blas=true
      - --sysroot
      - "{{ .Env.SDK_PATH }}"
      - install-antfly
  # ============================================
  # Go fallback OMNI builds (ONNX + XLA) for old data dirs and rollback.
  # ============================================

  # Linux AMD64 Go fallback OMNI (ONNX + XLA)
  - id: "antfly-go-linux-amd64"
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=simd
      - CGO_LDFLAGS=-L{{ .Env.ONNXRUNTIME_ROOT }}/linux-amd64/lib -lonnxruntime -ltokenizers -lstdc++
      - CGO_CFLAGS=-I{{ .Env.ONNXRUNTIME_ROOT }}/linux-amd64/include
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    tags:
      - afrelease
      - onnx
      - ORT
      - xla
      - XLA
    goos:
      - linux
    goarch:
      - amd64
    main: ./cmd/antfly
    binary: antfly-go

  # Linux ARM64 Go fallback OMNI (ONNX + XLA) (cross-compile)
  - id: "antfly-go-linux-arm64"
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=simd
      - CC=aarch64-linux-gnu-gcc
      - CXX=aarch64-linux-gnu-g++
      - CGO_LDFLAGS=-L{{ .Env.ONNXRUNTIME_ROOT }}/linux-arm64/lib -lonnxruntime -ltokenizers -lstdc++
      - CGO_CFLAGS=-I{{ .Env.ONNXRUNTIME_ROOT }}/linux-arm64/include
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    tags:
      - afrelease
      - onnx
      - ORT
      - xla
      - XLA
    goos:
      - linux
    goarch:
      - arm64
    main: ./cmd/antfly
    binary: antfly-go

  # macOS ARM64 Go fallback OMNI (ONNX + XLA) (Zig cross-compilation)
  - id: "antfly-go-darwin-arm64"
    env:
      - CGO_ENABLED=1
      - GOEXPERIMENT=simd
      - CC=zig c++ -target aarch64-macos -isysroot {{ .Env.SDK_PATH }} -I{{ .Env.SDK_PATH }}/usr/include -I{{ .Env.SDK_PATH }}/System/Library/Frameworks/Kernel.framework/Versions/A/Headers -F{{ .Env.SDK_PATH }}/System/Library/Frameworks -Wno-nullability-completeness
      - CXX=zig c++ -target aarch64-macos -isysroot {{ .Env.SDK_PATH }} -I{{ .Env.SDK_PATH }}/usr/include -I{{ .Env.SDK_PATH }}/System/Library/Frameworks/Kernel.framework/Versions/A/Headers -F{{ .Env.SDK_PATH }}/System/Library/Frameworks -Wno-nullability-completeness
      - CGO_LDFLAGS=-L{{ .Env.ONNXRUNTIME_ROOT }}/darwin-arm64/lib -L{{ .Env.SDK_PATH }}/usr/lib -lonnxruntime -ltokenizers -F{{ .Env.SDK_PATH }}/System/Library/Frameworks -framework CoreFoundation -framework Security
      - CGO_CFLAGS=-I{{ .Env.ONNXRUNTIME_ROOT }}/darwin-arm64/include -isysroot {{ .Env.SDK_PATH }} -I{{ .Env.SDK_PATH }}/usr/include -I{{ .Env.SDK_PATH }}/System/Library/Frameworks/Kernel.framework/Versions/A/Headers -Wno-nullability-completeness
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
      - -extldflags "-Wl,-rpath,@executable_path/lib"
    tags:
      - afrelease
      - onnx
      - ORT
      - xla
      - XLA
    goos:
      - darwin
    goarch:
      - arm64
    main: ./cmd/antfly
    binary: antfly-go

archives:
  # Default Zig Antfly runtime builds
  - id: default
    formats: [tar.gz]
    # this name template makes the OS and Arch compatible with the results of `uname`.
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    ids:
      - antfly-linux
      - antfly-darwin-arm64
    files:
      - README.md
      - LICENSE

  # Go fallback builds. Linux and macOS include bundled ONNX Runtime and PJRT
  # libraries so existing Go/omni users can keep old data dirs or take a
  # portable backup before restoring into the Zig runtime.
  - id: go
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-go_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    ids:
      - antfly-go-windows
      - antfly-go-linux-amd64
      - antfly-go-linux-arm64
      - antfly-go-darwin-arm64
    files:
      - README.md
      - LICENSE
      - completions/*
      # Bundle ONNX Runtime libraries for Linux and macOS fallback builds.
      - src: "onnxruntime/{{ .Os }}-{{ .Arch }}/lib/libonnxruntime*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755
      # Bundle ONNX Runtime GenAI libraries (for LLM generation)
      # Note: Not available for linux-arm64 and Windows, glob silently skips if no match
      - src: "onnxruntime/{{ .Os }}-{{ .Arch }}/lib/libonnxruntime-genai*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755
      # Bundle PJRT CPU plugin for XLA backend
      - src: "pjrt/{{ .Os }}-{{ .Arch }}/lib/pjrt_c_api_cpu*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755

  # Legacy archive id retained for compatibility with old local release commands.
  # Includes bundled ONNX Runtime and PJRT libraries
  - id: omni
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}-omni_
      {{- .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}
    ids:
      - antfly-go-linux-amd64
      - antfly-go-linux-arm64
      - antfly-go-darwin-arm64
    files:
      - README.md
      - LICENSE
      - completions/*
      # Bundle ONNX Runtime libraries for each platform
      - src: "onnxruntime/{{ .Os }}-{{ .Arch }}/lib/libonnxruntime*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755
      # Bundle ONNX Runtime GenAI libraries (for LLM generation)
      # Note: Not available for linux-arm64, glob silently skips if no match
      - src: "onnxruntime/{{ .Os }}-{{ .Arch }}/lib/libonnxruntime-genai*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755
      # Bundle PJRT CPU plugin for XLA backend
      - src: "pjrt/{{ .Os }}-{{ .Arch }}/lib/pjrt_c_api_cpu*"
        dst: lib/
        strip_parent: true
        info:
          mode: 0755

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - Merge pull request
      - Merge branch
      - go mod tidy

release:
  # https://goreleaser.com/customization/release/
  github:
    owner: antflydb
    name: antfly
  # Do not auto-publish the release.
  draft: true
  # Whether to remove existing draft releases with the same name before creating
  # a new one. Only effective if `draft` is set to true.
  replace_existing_draft: true
  # Whether to use an existing draft release as the target release.
  use_existing_draft: true
  # Whether to remove an artifact that already exists.
  replace_existing_artifacts: true
  # If set to auto, will mark the release as not ready for production
  # in case there is an indicator for this in the tag e.g. v1.0.0-rc1
  # If set to true, will mark the release as not ready for production.
  # Default: false.
  prerelease: auto
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
  header: |
    # Antfly version {{.Tag}}

    ### Documentation ({{ .Date }})

    The documentation for is available here :

    https://docs.antfly.io
  # What to do with the release notes in case there the release already exists.
  #
  # Valid options are:
  # - `keep-existing`: keep the existing notes
  # - `append`: append the current release notes to the existing notes
  # - `prepend`: prepend the current release notes to the existing notes
  # - `replace`: replace existing notes
  #
  # Default: `keep-existing`.
  mode: replace
  # You can add extra pre-existing files to the release.
  # The filename on the release will be the last part of the path (base).
  # If another file with the same name exists, the last one found will be used.
  #
  # Templates: allowed.
  # extra_files:
  #   - glob: ./path/to/file.txt
  #   - glob: ./glob/**/to/**/file/**/*
  #   - glob: ./glob/foo/to/bar/file/foobar/override_from_previous
  #   - glob: ./single_file.txt
  #     name_template: file.txt # note that this only works if glob matches 1 file only

  # Upload metadata.json and artifacts.json to the release as well.
  include_meta: true
brews:
  - name: antfly
    ids:
      - default
    skip_upload: auto
    directory: Formula
    repository:
      owner: antflydb
      name: homebrew-taps
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://docs.antfly.io"
    description: "Native Zig AntflyDB runtime"
    license: "Elastic-2.0"
    url_template: "https://releases.antfly.io/antfly/{{ .Tag }}/{{ .ArtifactName }}"
    install: |
      bin.install "antfly"
    service: |
      run [opt_bin/"antfly", "swarm", "--data-dir", var/"lib/antfly"]
      keep_alive true
      working_dir var/"lib/antfly"
      log_path var/"log/antfly.log"
      error_log_path var/"log/antfly.err.log"
    post_install: |
      (var/"lib/antfly").mkpath
    test: |
      system "#{bin}/antfly", "--help"
    caveats: |
      antfly is now the native Zig runtime.

      Existing data directories created by the Go/omni runtime are not opened
      in place. Create a portable backup with the previous Go/omni runtime,
      start the Zig runtime with a fresh data directory, then restore the backup.

      The Go/omni runtime remains available as:
        brew install antflydb/taps/antfly-go

      Start the local single-node service with:
        brew services start antflydb/taps/antfly
  - name: antfly-go
    ids:
      - go
    skip_upload: auto
    directory: Formula
    repository:
      owner: antflydb
      name: homebrew-taps
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://docs.antfly.io"
    description: "Go/omni AntflyDB fallback runtime"
    license: "Elastic-2.0"
    url_template: "https://releases.antfly.io/antfly/{{ .Tag }}/{{ .ArtifactName }}"
    install: |
      libexec.install "antfly-go"
      libexec.install "lib" if Dir.exist?("lib")
      bin.write_exec_script libexec/"antfly-go"
      bash_completion.install "completions/antfly.bash" => "antfly-go"
      zsh_completion.install "completions/antfly.zsh" => "_antfly-go"
      fish_completion.install "completions/antfly.fish" => "antfly-go.fish"
    service: |
      run [opt_bin/"antfly-go", "--data-dir", var/"lib/antfly", "swarm"]
      keep_alive true
      working_dir var/"lib/antfly"
      log_path var/"log/antfly-go.log"
      error_log_path var/"log/antfly-go.err.log"
    post_install: |
      (var/"lib/antfly").mkpath
    test: |
      system "#{bin}/antfly-go", "--version"
    caveats: |
      antfly-go is the previous Go/omni runtime. Use it to keep running an old
      Go data directory or to create a portable backup before restoring into
      the default Zig runtime.
nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    # - file_name_template: >-
    #     antfly-
    #     {{- .Version}}_{{.Os}}-
    #     {{- if eq .Arch "amd64" }}x86_64
    #     {{- else if eq .Arch "386" }}i386
    #     {{- else if eq .Arch "darwin" }}MacOS
    #     {{- else if eq .Arch "linux" }}Linux
    #     {{- else if eq .Arch "windows" }}Windows
    #     {{- else }}{{ .Arch }}{{ end }}
    homepage: https://antfly.io
    description: A command line interface for running AntfyDB indexing
    maintainer: Antfly Developers <contact@antfly.io>
    license: Elastic-2.0
    vendor: Red Hat
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    ids:
      - antfly-linux
    id: antfly
blobs:
  # https://goreleaser.com/customization/blob/
  # You can have multiple blob configs
  - provider: s3
    endpoint: "{{ .Env.AWS_ENDPOINT_URL }}"
    region: auto  # Required for Cloudflare R2 (doesn't accept AWS region names like us-east-2)
    bucket: antfly-releases
    # No ids filter: upload every generated artifact, including Zig default,
    # Go fallback, checksums, and Linux packages.
    # You can add extra pre-existing files to the bucket.
    #
    # The filename on the release will be the last part of the path (base).
    # If another file with the same name exists, the last one found will be used.
    # These globs can also include templates.
    extra_files:
      - glob: ./scripts/install.sh
      - glob: ./openapi.yaml
    #   - glob: ./path/to/file.txt
    #   - glob: ./glob/**/to/**/file/**/*
    #   - glob: ./glob/foo/to/bar/file/foobar/override_from_previous
    #   - glob: ./single_file.txt
    #     # Templates: allowed.
    #     name_template: file.txt # note that this only works if glob matches 1 file only
    # Upload metadata.json and artifacts.json to the release as well.
    include_meta: true
    # Upload only the files defined in extra_files.
    # extra_files_only: true
  # Upload to /latest/ path for easy installation (stable releases only)
  - provider: s3
    endpoint: "{{ .Env.AWS_ENDPOINT_URL }}"
    region: auto  # Required for Cloudflare R2
    bucket: antfly-releases
    directory: "antfly/latest"
    disable: "{{ if .Prerelease }}true{{ end }}"
    # No ids filter: publish all stable-release artifacts to the latest channel.
    extra_files:
      - glob: ./scripts/install.sh
      - glob: ./openapi.yaml
    include_meta: true
env_files:
  # FIXME (ajr) this isn't working
  # use GITHUB_TOKEN env var instead
  github_token: ./github_token
