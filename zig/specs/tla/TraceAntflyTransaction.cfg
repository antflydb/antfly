\* TLC configuration for trace validation of AntflyTransaction.
\*
\* All constants are derived from the trace file itself -- no model values
\* or MC module needed. The trace events emitted by instrumented Go code
\* (built with -tags with_tla) contain enough state to reconstruct the
\* full constant model.
\*
\* Usage:
\*   env JSON=trace.ndjson java -cp tla2tools.jar:CommunityModules-deps.jar \
\*     tlc2.TLC TraceAntflyTransaction -config TraceAntflyTransaction.cfg \
\*     -workers 1 -lncheck final

CONSTANTS
    Txns                  <- TraceTxns
    Shards                <- TraceShards
    Keys                  <- TraceKeys
    TxnShards             <- TraceTxnShards
    TxnKeys               <- TraceTxnKeys
    TxnReadSet            <- TraceTxnReadSet
    TxnCoord              <- TraceTxnCoord
    MaxTimestamp           <- TraceMaxTimestamp
    StalePendingThreshold <- TraceStalePendingThreshold

SPECIFICATION TraceSpec

VIEW TraceView

CHECK_DEADLOCK FALSE

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    AtomicityInvariant
    NoOrphanedIntents
    OCCSerializationInvariant
    LWWConsistency

\* Liveness: the entire trace must be consumed
PROPERTIES
    TraceMatched
