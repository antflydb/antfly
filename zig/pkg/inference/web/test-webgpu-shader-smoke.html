<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Termite WebGPU shader smoke</title>
  <style>
    body {
      font: 14px/1.5 system-ui, sans-serif;
      margin: 24px;
      max-width: 920px;
    }

    pre {
      background: #111;
      color: #eee;
      overflow: auto;
      padding: 12px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Termite WebGPU shader smoke</h1>
  <pre id="log">pending</pre>

  <script type="module">
    import { WebGPUOps } from './webgpu-ops.js';

    const logEl = document.getElementById('log');
    const memory = new WebAssembly.Memory({ initial: 1 });
    const scratchPtr = 0;
    const tolerance = 2e-5;

    function log(line) {
      logEl.textContent += `${line}\n`;
    }

    function resetLog() {
      logEl.textContent = '';
    }

    function writeF32(ptr, values) {
      new Float32Array(memory.buffer, ptr, values.length).set(values);
    }

    function writeU32(ptr, values) {
      new Uint32Array(memory.buffer, ptr, values.length).set(values);
    }

    function readF32(ptr, len) {
      return Array.from(new Float32Array(memory.buffer, ptr, len));
    }

    function maxAbsDiff(actual, expected) {
      let maxAbs = 0;
      for (let i = 0; i < expected.length; i++) {
        maxAbs = Math.max(maxAbs, Math.abs(actual[i] - expected[i]));
      }
      return maxAbs;
    }

    function expectClose(name, actual, expected, tol = tolerance) {
      const maxAbs = maxAbsDiff(actual, expected);
      log(`${name}: maxAbs=${maxAbs.toExponential(6)}`);
      if (maxAbs > tol) {
        throw new Error(`${name} exceeded tolerance ${tol}: actual=${JSON.stringify(actual)} expected=${JSON.stringify(expected)}`);
      }
    }

    function softmaxReference(values, rows, dim) {
      const out = new Array(values.length);
      for (let row = 0; row < rows; row++) {
        const base = row * dim;
        let rowMax = -Infinity;
        for (let j = 0; j < dim; j++) rowMax = Math.max(rowMax, values[base + j]);
        let sum = 0;
        for (let j = 0; j < dim; j++) {
          const v = Math.exp(values[base + j] - rowMax);
          out[base + j] = v;
          sum += v;
        }
        for (let j = 0; j < dim; j++) out[base + j] /= sum;
      }
      return out;
    }

    function logSoftmaxReference(values, rows, dim) {
      const out = new Array(values.length);
      for (let row = 0; row < rows; row++) {
        const base = row * dim;
        let rowMax = -Infinity;
        for (let j = 0; j < dim; j++) rowMax = Math.max(rowMax, values[base + j]);
        let sum = 0;
        for (let j = 0; j < dim; j++) sum += Math.exp(values[base + j] - rowMax);
        const lse = Math.log(sum);
        for (let j = 0; j < dim; j++) out[base + j] = (values[base + j] - rowMax) - lse;
      }
      return out;
    }

    function f32Bits(value) {
      const f32 = new Float32Array([value]);
      return new Uint32Array(f32.buffer)[0];
    }

    function f32ToF16Bits(value) {
      const f32 = new Float32Array(1);
      const u32 = new Uint32Array(f32.buffer);
      f32[0] = value;
      const x = u32[0];
      const sign = (x >>> 16) & 0x8000;
      let mantissa = x & 0x007fffff;
      let exp = (x >>> 23) & 0xff;
      if (exp === 0xff) return sign | (mantissa ? 0x7e00 : 0x7c00);
      exp = exp - 127 + 15;
      if (exp >= 0x1f) return sign | 0x7c00;
      if (exp <= 0) {
        if (exp < -10) return sign;
        mantissa = (mantissa | 0x00800000) >>> (1 - exp);
        return sign | ((mantissa + 0x00001000) >>> 13);
      }
      return sign | (exp << 10) | ((mantissa + 0x00001000) >>> 13);
    }

    function f16BitsToF32(bits) {
      const sign = (bits & 0x8000) ? -1 : 1;
      const exp = (bits >>> 10) & 0x1f;
      const mantissa = bits & 0x03ff;
      if (exp === 0) return sign * Math.pow(2, -14) * (mantissa / 1024);
      if (exp === 0x1f) return mantissa ? NaN : sign * Infinity;
      return sign * Math.pow(2, exp - 15) * (1 + mantissa / 1024);
    }

    function quantizeQ4_0Rows(rows, rowCount, k) {
      if (k % 32 !== 0) throw new Error('Q4_0 smoke requires k multiple of 32');
      const blocksPerRow = k / 32;
      const bytes = new Uint8Array(rowCount * blocksPerRow * 18);
      const dequant = new Array(rows.length);
      for (let row = 0; row < rowCount; row++) {
        for (let block = 0; block < blocksPerRow; block++) {
          const baseValue = row * k + block * 32;
          const baseByte = (row * blocksPerRow + block) * 18;
          let maxAbs = 0;
          for (let i = 0; i < 32; i++) maxAbs = Math.max(maxAbs, Math.abs(rows[baseValue + i]));
          const scale = maxAbs === 0 ? 0 : maxAbs / 7;
          const scaleBits = f32ToF16Bits(scale);
          bytes[baseByte] = scaleBits & 0xff;
          bytes[baseByte + 1] = (scaleBits >>> 8) & 0xff;
          const roundedScale = f16BitsToF32(scaleBits);
          for (let i = 0; i < 16; i++) {
            const q0 = scale === 0 ? 8 : Math.max(0, Math.min(15, Math.round(rows[baseValue + i] / scale) + 8));
            const q1 = scale === 0 ? 8 : Math.max(0, Math.min(15, Math.round(rows[baseValue + 16 + i] / scale) + 8));
            bytes[baseByte + 2 + i] = q0 | (q1 << 4);
            dequant[baseValue + i] = roundedScale * (q0 - 8);
            dequant[baseValue + 16 + i] = roundedScale * (q1 - 8);
          }
        }
      }
      return { bytes, dequant };
    }

    function matmulTransBReference(a, b, rows, outDim, inDim) {
      const out = new Array(rows * outDim).fill(0);
      for (let r = 0; r < rows; r++) {
        for (let o = 0; o < outDim; o++) {
          let acc = 0;
          for (let i = 0; i < inDim; i++) acc += a[r * inDim + i] * b[o * inDim + i];
          out[r * outDim + o] = acc;
        }
      }
      return out;
    }

    function addReference(a, b) {
      return a.map((v, i) => v + b[i]);
    }

    function geluReference(values) {
      return values.map((x) => {
        const z = x * 0.7071067811865475;
        const sign = z >= 0 ? 1 : -1;
        const ax = Math.abs(z);
        const t = 1 / (1 + 0.3275911 * ax);
        const poly = (((((1.061405429 * t - 1.453152027) * t) + 1.421413741) * t - 0.284496736) * t + 0.254829592) * t;
        const erf = sign * (1 - poly * Math.exp(-ax * ax));
        return 0.5 * x * (1 + erf);
      });
    }

    function rmsNormReference(values, weight, rows, dim, eps) {
      const out = new Array(values.length);
      for (let r = 0; r < rows; r++) {
        let sumSq = 0;
        for (let j = 0; j < dim; j++) {
          const v = values[r * dim + j];
          sumSq += v * v;
        }
        const inv = 1 / Math.sqrt(sumSq / dim + eps);
        for (let j = 0; j < dim; j++) out[r * dim + j] = values[r * dim + j] * inv * weight[j];
      }
      return out;
    }

    async function uploadF32(gpu, imports, values) {
      const id = gpu.createBuffer(values.length * Float32Array.BYTES_PER_ELEMENT);
      writeF32(scratchPtr, values);
      imports.gpu_upload(id, scratchPtr, values.length * Float32Array.BYTES_PER_ELEMENT);
      return id;
    }

    async function uploadBytes(gpu, imports, bytes) {
      const id = gpu.createBuffer(bytes.length);
      new Uint8Array(memory.buffer, scratchPtr, bytes.length).set(bytes);
      imports.gpu_upload(id, scratchPtr, bytes.length);
      return id;
    }

    async function downloadF32(gpu, imports, id, len) {
      imports.gpu_download(id, scratchPtr, len * Float32Array.BYTES_PER_ELEMENT);
      await gpu.flush();
      return readF32(scratchPtr, len);
    }

    async function runBinary(gpu, imports, name, fnName, a, b, expected) {
      const aId = await uploadF32(gpu, imports, a);
      const bId = await uploadF32(gpu, imports, b);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      imports[fnName](aId, bId, outId, expected.length, a.length, b.length);
      expectClose(name, await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(aId);
      gpu.freeBuffer(bId);
      gpu.freeBuffer(outId);
    }

    async function runUnary(gpu, imports, name, fnName, input, expected, tol = tolerance) {
      const inputId = await uploadF32(gpu, imports, input);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      imports[fnName](inputId, outId, expected.length);
      expectClose(name, await downloadF32(gpu, imports, outId, expected.length), expected, tol);
      gpu.freeBuffer(inputId);
      gpu.freeBuffer(outId);
    }

    async function runWhereSelect(gpu, imports) {
      const cond = [0, 1, 1, 0];
      const onTrue = [10];
      const onFalse = [1, 2, 3, 4];
      const expected = [1, 10, 10, 4];
      const condId = await uploadF32(gpu, imports, cond);
      const trueId = await uploadF32(gpu, imports, onTrue);
      const falseId = await uploadF32(gpu, imports, onFalse);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      imports.gpu_where_select(condId, trueId, falseId, outId, expected.length, onTrue.length, onFalse.length);
      expectClose('where_select', await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(condId);
      gpu.freeBuffer(trueId);
      gpu.freeBuffer(falseId);
      gpu.freeBuffer(outId);
    }

    async function runSoftmax(gpu, imports, name, fnName, input, rows, dim, expected) {
      const inputId = await uploadF32(gpu, imports, input);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      imports[fnName](inputId, outId, rows, dim);
      expectClose(name, await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(inputId);
      gpu.freeBuffer(outId);
    }

    async function runReduce(gpu, imports, name, fnName, input, rows, dim, expected) {
      const inputId = await uploadF32(gpu, imports, input);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      imports[fnName](inputId, outId, rows, dim);
      expectClose(name, await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(inputId);
      gpu.freeBuffer(outId);
    }

    async function runGeneralReduce(gpu, imports, name, fnName, input, expected, params) {
      const inputId = await uploadF32(gpu, imports, input);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      const ptrBase = 8192;
      writeU32(ptrBase, params.inputShape);
      writeU32(ptrBase + 32, params.outShape);
      writeU32(ptrBase + 64, params.reduced);
      writeU32(ptrBase + 96, params.inStrides);
      writeU32(ptrBase + 128, params.outStrides);
      writeU32(ptrBase + 160, params.keptAxes);
      writeU32(ptrBase + 192, params.reducedAxes);
      imports[fnName](
        inputId,
        outId,
        expected.length,
        params.reduceCount,
        params.inRank,
        params.outRank,
        ptrBase,
        ptrBase + 32,
        ptrBase + 64,
        ptrBase + 96,
        ptrBase + 128,
        ptrBase + 160,
        ptrBase + 192,
      );
      expectClose(name, await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(inputId);
      gpu.freeBuffer(outId);
    }

    async function runBroadcast(gpu, imports) {
      const input = [10, 20, 30, 40];
      const expected = [
        10, 20, 30, 40,
        10, 20, 30, 40,
        10, 20, 30, 40,
        10, 20, 30, 40,
        10, 20, 30, 40,
        10, 20, 30, 40,
      ];
      const inputId = await uploadF32(gpu, imports, input);
      const outId = gpu.createBuffer(expected.length * Float32Array.BYTES_PER_ELEMENT);
      const ptrBase = 4096;
      writeU32(ptrBase, [2, 3, 4, 1, 1, 1, 1, 1]);
      writeU32(ptrBase + 32, [1, 1, 4, 1, 1, 1, 1, 1]);
      writeU32(ptrBase + 64, [0, 1, 2, 0, 0, 0, 0, 0]);
      writeU32(ptrBase + 96, [12, 4, 1, 1, 1, 1, 1, 1]);
      writeU32(ptrBase + 128, [4, 4, 1, 1, 1, 1, 1, 1]);
      imports.gpu_broadcast_in_dim(inputId, outId, expected.length, 3, 3, ptrBase, ptrBase + 32, ptrBase + 64, ptrBase + 96, ptrBase + 128);
      expectClose('broadcast_in_dim', await downloadF32(gpu, imports, outId, expected.length), expected);
      gpu.freeBuffer(inputId);
      gpu.freeBuffer(outId);
    }

    async function runResidentTransformerBlock(gpu, imports) {
      const rows = 16;
      const hidden = 32;
      const len = rows * hidden;
      const input = Array.from({ length: len }, (_, i) => ((i * 17) % 37) / 37 - 0.5);
      const qkvWeight = Array.from({ length: hidden * hidden }, (_, i) => ((i * 13) % 41) / 41 - 0.5);
      const normWeight = Array.from({ length: hidden }, (_, i) => 0.75 + ((i * 5) % 17) / 32);
      const projWeight = Array.from({ length: hidden * hidden }, (_, i) => ((i * 19) % 43) / 43 - 0.5);
      const outWeight = Array.from({ length: hidden * hidden }, (_, i) => ((i * 23) % 47) / 47 - 0.5);
      const quantQkv = quantizeQ4_0Rows(qkvWeight, hidden, hidden);

      const xId = await uploadF32(gpu, imports, input);
      const qkvWeightId = await uploadBytes(gpu, imports, quantQkv.bytes);
      const normWeightId = await uploadF32(gpu, imports, normWeight);
      const projWeightId = await uploadF32(gpu, imports, projWeight);
      const outWeightId = await uploadF32(gpu, imports, outWeight);
      const qkvId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const normId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const geluId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const projId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const residId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const softmaxId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);
      const outId = gpu.createBuffer(len * Float32Array.BYTES_PER_ELEMENT);

      const downloadsBefore = globalThis.__termiteDownloadCount ?? 0;
      imports.gpu_matmul_transb_q4_0(xId, qkvWeightId, qkvId, rows, hidden, hidden);
      imports.gpu_rms_norm(qkvId, normWeightId, normId, rows, hidden, f32Bits(1e-5));
      imports.gpu_gelu(normId, geluId, len);
      imports.gpu_matmul_transb(geluId, projWeightId, projId, rows, hidden, hidden);
      imports.gpu_add(projId, xId, residId, len);
      imports.gpu_softmax(residId, softmaxId, rows, hidden);
      imports.gpu_matmul_transb(softmaxId, outWeightId, outId, rows, hidden, hidden);
      if ((globalThis.__termiteDownloadCount ?? 0) !== downloadsBefore) {
        throw new Error('resident transformer block downloaded before final output');
      }

      const expectedQkv = matmulTransBReference(input, quantQkv.dequant, rows, hidden, hidden);
      const expectedNorm = rmsNormReference(expectedQkv, normWeight, rows, hidden, 1e-5);
      const expectedGelu = geluReference(expectedNorm);
      const expectedProj = matmulTransBReference(expectedGelu, projWeight, rows, hidden, hidden);
      const expectedResid = addReference(expectedProj, input);
      const expectedSoftmax = softmaxReference(expectedResid, rows, hidden);
      const expected = matmulTransBReference(expectedSoftmax, outWeight, rows, hidden, hidden);
      expectClose('resident transformer block q4/rms/gelu/softmax', await downloadF32(gpu, imports, outId, len), expected, 2e-3);

      for (const id of [xId, qkvWeightId, normWeightId, projWeightId, outWeightId, qkvId, normId, geluId, projId, residId, softmaxId, outId]) {
        gpu.freeBuffer(id);
      }
    }

    async function run() {
      resetLog();
      try {
        if (!navigator.gpu) throw new Error('navigator.gpu is unavailable');

        const gpu = new WebGPUOps();
        const ok = await gpu.init();
        if (!ok) throw new Error(gpu.lastInitError ?? 'WebGPU init failed');

        const imports = gpu.getImports(memory);
        const rawDownload = imports.gpu_download;
        globalThis.__termiteDownloadCount = 0;
        imports.gpu_download = (...args) => {
          globalThis.__termiteDownloadCount += 1;
          return rawDownload(...args);
        };

        await runBinary(gpu, imports, 'sub broadcast', 'gpu_sub', [5, 6, 7, 8], [1, 2], [4, 4, 6, 6]);
        await runBinary(gpu, imports, 'add broadcast', 'gpu_add_broadcast', [5, 6, 7, 8], [1, 2], [6, 8, 8, 10]);
        await runBinary(gpu, imports, 'mul broadcast', 'gpu_mul', [2, 3, 4, 5], [10, 0.5], [20, 1.5, 40, 2.5]);
        await runBinary(gpu, imports, 'div scalar', 'gpu_div', [4, 9, 16, 25], [2], [2, 4.5, 8, 12.5]);
        await runBinary(gpu, imports, 'less_than broadcast', 'gpu_less_than', [0, 3, 2, 8], [1, 2], [1, 0, 0, 0]);
        await runWhereSelect(gpu, imports);

        const unaryInput = [-1.5, -0.25, 0.25, 2.0];
        await runUnary(gpu, imports, 'neg', 'gpu_neg', unaryInput, unaryInput.map((v) => -v));
        await runUnary(gpu, imports, 'sqrt', 'gpu_sqrt', [0.25, 1, 4, 9], [0.5, 1, 2, 3]);
        await runUnary(gpu, imports, 'rsqrt', 'gpu_rsqrt', [0.25, 1, 4, 16], [2, 1, 0.5, 0.25]);
        await runUnary(gpu, imports, 'exp', 'gpu_exp', [-1, 0, 1, 2], [-1, 0, 1, 2].map(Math.exp));
        await runUnary(gpu, imports, 'log', 'gpu_log', [0.25, 1, 2, 8], [0.25, 1, 2, 8].map(Math.log));
        await runUnary(gpu, imports, 'sin', 'gpu_sin', [0, 0.5, 1, 2], [0, 0.5, 1, 2].map(Math.sin));
        await runUnary(gpu, imports, 'cos', 'gpu_cos', [0, 0.5, 1, 2], [0, 0.5, 1, 2].map(Math.cos));
        await runUnary(gpu, imports, 'tanh', 'gpu_tanh', [-2, -0.5, 0.5, 2], [-2, -0.5, 0.5, 2].map(Math.tanh), 5e-5);
        await runUnary(gpu, imports, 'abs', 'gpu_abs', unaryInput, unaryInput.map(Math.abs));
        await runUnary(gpu, imports, 'erf', 'gpu_erf', [-1, -0.5, 0.5, 1], [-0.8427006897, -0.5205000163, 0.5205000163, 0.8427006897], 2e-4);

        const softmaxInput = [1, 2, 3, 4, -1, 0, 1, 2];
        await runSoftmax(gpu, imports, 'softmax', 'gpu_softmax', softmaxInput, 2, 4, softmaxReference(softmaxInput, 2, 4));
        await runSoftmax(gpu, imports, 'log_softmax', 'gpu_log_softmax', softmaxInput, 2, 4, logSoftmaxReference(softmaxInput, 2, 4));
        await runReduce(gpu, imports, 'reduce_sum_last_dim', 'gpu_reduce_sum_last_dim', softmaxInput, 2, 4, [10, 2]);
        await runReduce(gpu, imports, 'reduce_max_last_dim', 'gpu_reduce_max_last_dim', softmaxInput, 2, 4, [4, 2]);
        await runReduce(gpu, imports, 'reduce_mean_last_dim', 'gpu_reduce_mean_last_dim', softmaxInput, 2, 4, [2.5, 0.5]);
        const reduceInput3d = Array.from({ length: 24 }, (_, i) => i + 1);
        const reduceAxis1Params = {
          reduceCount: 3,
          inRank: 3,
          outRank: 2,
          inputShape: [2, 3, 4, 1, 1, 1, 1, 1],
          outShape: [2, 4, 1, 1, 1, 1, 1, 1],
          reduced: [0, 1, 0, 0, 0, 0, 0, 0],
          inStrides: [12, 4, 1, 1, 1, 1, 1, 1],
          outStrides: [4, 1, 1, 1, 1, 1, 1, 1],
          keptAxes: [0, 2, 0, 0, 0, 0, 0, 0],
          reducedAxes: [1, 0, 0, 0, 0, 0, 0, 0],
        };
        await runGeneralReduce(gpu, imports, 'reduce_sum_axis1', 'gpu_reduce_sum', reduceInput3d, [15, 18, 21, 24, 51, 54, 57, 60], reduceAxis1Params);
        await runGeneralReduce(gpu, imports, 'reduce_max_axis1', 'gpu_reduce_max', reduceInput3d, [9, 10, 11, 12, 21, 22, 23, 24], reduceAxis1Params);
        const reduceAxes02Params = {
          reduceCount: 8,
          inRank: 3,
          outRank: 1,
          inputShape: [2, 3, 4, 1, 1, 1, 1, 1],
          outShape: [3, 1, 1, 1, 1, 1, 1, 1],
          reduced: [1, 0, 1, 0, 0, 0, 0, 0],
          inStrides: [12, 4, 1, 1, 1, 1, 1, 1],
          outStrides: [1, 1, 1, 1, 1, 1, 1, 1],
          keptAxes: [1, 0, 0, 0, 0, 0, 0, 0],
          reducedAxes: [0, 2, 0, 0, 0, 0, 0, 0],
        };
        await runGeneralReduce(gpu, imports, 'reduce_mean_axes02', 'gpu_reduce_mean', reduceInput3d, [8.5, 12.5, 16.5], reduceAxes02Params);
        await runBroadcast(gpu, imports);
        await runResidentTransformerBlock(gpu, imports);

        log('RESULT: PASS');
        document.body.dataset.result = 'PASS';
      } catch (err) {
        log(`RESULT: FAIL ${err?.stack ?? err}`);
        document.body.dataset.result = 'FAIL';
      }
    }

    window.addEventListener('load', run);
  </script>
</body>
</html>
