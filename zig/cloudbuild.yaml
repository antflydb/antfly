# Cloud Build config for the Antfly Zig runtime image.
#
# Substitutions:
#   _IMAGE_NAME: image name in the antfly-labs repo
#   _DOCKERFILE: Dockerfile path relative to repo root
#   _CONTEXT: build context path
#   _ALIAS_TAG: optional stable tag, such as zig
#   _VERSION_TAG: versioned tag, such as zig-v0.1.0
#   _CACHE_TAG: registry cache tag
#   _PLATFORMS: build platforms
#   _DESCRIPTION: OCI image description

steps:
  - name: gcr.io/cloud-builders/docker
    id: setup-buildx
    args:
      - buildx
      - create
      - --use
      - --name=multiarch
      - --driver=docker-container

  - name: gcr.io/cloud-builders/docker
    id: build-push
    entrypoint: bash
    args:
      - -c
      - |
        set -eux
        IMAGE_BASE="us-east5-docker.pkg.dev/$PROJECT_ID/antfly-labs/${_IMAGE_NAME}"
        TAG_ARGS=(-t "$${IMAGE_BASE}:${_VERSION_TAG}")
        if [ -n "${_ALIAS_TAG}" ] && [ "${_ALIAS_TAG}" != "__skip_alias__" ]; then
          TAG_ARGS=(-t "$${IMAGE_BASE}:${_ALIAS_TAG}" "$${TAG_ARGS[@]}")
        fi
        docker buildx build \
          --progress=plain \
          --platform="${_PLATFORMS}" \
          --push \
          -f "${_DOCKERFILE}" \
          "$${TAG_ARGS[@]}" \
          --annotation "index:org.opencontainers.image.description=${_DESCRIPTION}" \
          --cache-from "type=registry,ref=$${IMAGE_BASE}:${_CACHE_TAG}" \
          --cache-to "type=registry,ref=$${IMAGE_BASE}:${_CACHE_TAG},mode=max" \
          "${_CONTEXT}"

options:
  logging: CLOUD_LOGGING_ONLY

timeout: 7200s

substitutions:
  _IMAGE_NAME: antfly
  _DOCKERFILE: zig/Dockerfile
  _CONTEXT: "."
  _ALIAS_TAG: zig
  _VERSION_TAG: zig-latest
  _CACHE_TAG: zig-buildcache
  _PLATFORMS: linux/amd64,linux/arm64
  _DESCRIPTION: AntflyDB Zig runtime image
