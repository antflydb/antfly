[package]
name = "antfly-client"
version = "0.1.0"
edition = "2024"
description = "Async Rust client for the Antfly API, generated from the OpenAPI spec"

[dependencies]
progenitor-client = "0.13"
reqwest = { version = "0.13", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
regress = "0.10"

[build-dependencies]
progenitor = "0.13"
prettyplease = "0.2"
syn = "2.0"
serde_yaml = "0.9"
openapiv3 = "2.2"
