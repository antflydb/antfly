# Termite Operator CI workflow
# Tests, lints, and builds the Termite Kubernetes operator

name: Termite Operator Tests

on:
  push:
    branches: ["main"]
    paths:
      - 'pkg/termite-operator/**'
      - '.github/workflows/termite-operator-*.yml'
  pull_request:
    branches: ["main"]
    paths:
      - 'pkg/termite-operator/**'
      - '.github/workflows/termite-operator-*.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: codebuild-GitHubActionsRunnerAntflyAntflyDB-${{ github.run_id }}-${{ github.run_attempt }}
    defaults:
      run:
        working-directory: pkg/termite-operator
    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Set Go experiment
        run: echo "GOEXPERIMENT=simd" >> $GITHUB_ENV

      - name: Verify Go version
        run: go version

      - name: Download dependencies
        run: GOWORK=off go mod download

      - name: Run tests
        run: GOWORK=off go test ./...

      - name: Run vet
        run: GOWORK=off go vet ./...

      - name: Build
        run: GOWORK=off go build -v -o ../../termite-operator ./cmd/termite-operator
