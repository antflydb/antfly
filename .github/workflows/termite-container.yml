# Termite Container release workflow
# Builds and publishes container images on pkg/termite/v* tags

name: Termite Container

on:
  push:
    tags:
      - "pkg/termite/v*"  # Triggers on pkg/termite/v1.0.0, etc.
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag name (e.g., pkg/termite/v0.1.0)"
        required: false
        type: string

env:
  GCP_REGION: us-east5
  GCP_PROJECT: antfly-image-artifacts
  GCP_REPOSITORY: antfly-labs
  IMAGE_NAME: termite

jobs:
  publish:
    runs-on: codebuild-GitHubActionsRunnerAntflyAntflyDB-${{ github.run_id }}-${{ github.run_attempt }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      # Authenticate with Docker Hub to avoid rate limits on base images
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Extract version
        id: version
        run: |
          TAG="${{ inputs.tag_name || github.ref_name }}"
          VERSION="${TAG#pkg/termite/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      # Build the canonical termite container image.
      - name: Build and push termite image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.termite
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/antflydb/termite:latest
            ghcr.io/antflydb/termite:${{ steps.version.outputs.version }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha,scope=termite-omni-bookworm
          cache-to: type=gha,mode=max,scope=termite-omni-bookworm

      - uses: sigstore/cosign-installer@v3

      - name: Sign GHCR images (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for tag in latest "${VERSION}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ghcr.io/antflydb/termite:${tag}
          done

      - name: Sign GAR images (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          GAR_BASE="${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}"
          for tag in latest "${VERSION}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ${GAR_BASE}/termite:${tag}
          done
