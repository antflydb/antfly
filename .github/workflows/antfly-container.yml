name: Container

on:
  release:
    types: [published]
  workflow_call:
    inputs:
      tag_name:
        description: "The release tag name (e.g., v1.0.0)"
        required: true
        type: string

env:
  GAR_LOCATION: us-east5
  GAR_PROJECT: antfly-image-artifacts
  GAR_REPOSITORY: antfly-labs
  GAR_IMAGE: antfly
  CLOUD_BUILD_WORKER_POOL: projects/antfly-image-artifacts/locations/us-east5/workerPools/antfly-container-builders

jobs:
  publish-antfly-docker-image:
    runs-on: arc-antfly-publish
    environment: container-publish
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Initialize submodules
        run: git submodule update --init termite

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Extract version
        id: version
        run: |
          VERSION="${{ inputs.tag_name || github.event.release.tag_name }}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Release version: ${VERSION}"

      - name: Build and push GAR antfly image with Cloud Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS_TAG=latest
          if [[ "$VERSION" == *-* ]]; then
            ALIAS_TAG=__skip_alias__
          fi
          gcloud builds submit . \
            --project="${GAR_PROJECT}" \
            --region="${GAR_LOCATION}" \
            --worker-pool="${CLOUD_BUILD_WORKER_POOL}" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE_NAME=${GAR_IMAGE},_DOCKERFILE=Dockerfile,_CONTEXT=.,_ALIAS_TAG=${ALIAS_TAG},_VERSION_TAG=${VERSION},_CACHE_TAG=buildcache,_DESCRIPTION=AntflyDB - Distributed document database with vector search for AI applications multi-arch image"

      - name: Build and push GAR antfly omni image with Cloud Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ALIAS_TAG=omni
          if [[ "$VERSION" == *-* ]]; then
            ALIAS_TAG=__skip_alias__
          fi
          gcloud builds submit . \
            --project="${GAR_PROJECT}" \
            --region="${GAR_LOCATION}" \
            --worker-pool="${CLOUD_BUILD_WORKER_POOL}" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE_NAME=${GAR_IMAGE},_DOCKERFILE=Dockerfile.omni,_CONTEXT=.,_ALIAS_TAG=${ALIAS_TAG},_VERSION_TAG=omni-${VERSION},_CACHE_TAG=omni-buildcache,_PLATFORMS=linux/amd64,_DESCRIPTION=AntflyDB omni image"

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Mirror images GAR -> GHCR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "${{ steps.auth.outputs.access_token }}" | crane auth login "${GAR_LOCATION}-docker.pkg.dev" -u oauth2accesstoken --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          TAGS=("${VERSION}" "omni-${VERSION}")
          if [[ "$VERSION" != *-* ]]; then
            TAGS=(latest "${VERSION}" omni "omni-${VERSION}")
          fi
          for tag in "${TAGS[@]}"; do
            crane copy \
              "${GAR_LOCATION}-docker.pkg.dev/${GAR_PROJECT}/${GAR_REPOSITORY}/${GAR_IMAGE}:${tag}" \
              "ghcr.io/antflydb/antfly:${tag}"
          done

      - uses: sigstore/cosign-installer@v3

      - name: Sign container images with annotations (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAGS=("${VERSION}" "omni-${VERSION}")
          if [[ "$VERSION" != *-* ]]; then
            TAGS=(latest "${VERSION}" omni "omni-${VERSION}")
          fi
          for tag in "${TAGS[@]}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ghcr.io/antflydb/antfly:${tag}
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              "${GAR_LOCATION}-docker.pkg.dev/${GAR_PROJECT}/${GAR_REPOSITORY}/${GAR_IMAGE}:${tag}"
          done
