# Antfly Operator Release workflow
# Builds and publishes container images on pkg/operator/v* tags

name: Antfly Operator Container

on:
  push:
    tags:
      - "pkg/operator/v*"  # Triggers on pkg/operator/v1.0.0, etc. (matches Go module tag convention)

env:
  # Google Cloud Artifact Registry configuration
  GCP_REGION: us-east5
  GCP_PROJECT: antfly-image-artifacts
  GCP_REPOSITORY: antfly-labs
  IMAGE_NAME: antfly-operator

jobs:
  publish:
    runs-on: codebuild-GitHubActionsRunnerAntflyAntflyDB-${{ github.run_id }}-${{ github.run_attempt }}
    # Required permissions for OIDC signing and GCP authentication
    permissions:
      contents: read
      packages: write
      id-token: write  # Required for keyless signing with OIDC and GCP Workload Identity
    steps:
      # Checkout the repository code
      - uses: actions/checkout@v6

      # Authenticate to Google Cloud using Workload Identity Federation
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      # Set up QEMU for multi-architecture emulation (enables building for arm64 on amd64)
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Set up Docker Buildx for advanced build features (multi-platform builds, caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authenticate with GitHub Container Registry using the workflow's built-in token
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Authenticate with Google Artifact Registry
      - name: Login to Google Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      # Extract version from tag (strip pkg/operator/ prefix)
      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#pkg/operator/}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Extracted version: ${VERSION}"

      # Build the Docker image for multiple architectures and push to both registries
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.antfly-operator
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/antflydb/antfly-operator:latest
            ghcr.io/antflydb/antfly-operator:${{ steps.version.outputs.version }}
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=Kubernetes operator for deploying and managing AntflyDB clusters multi-arch image
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Install cosign for container image signing
      - uses: sigstore/cosign-installer@v3

      # Sign GitHub Container Registry images with keyless OIDC
      # Uses GitHub's OIDC provider - no keys needed!
      # Annotations include repository, workflow, and commit information for verification
      - name: Sign GHCR container images with annotations (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for tag in latest "${VERSION}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ghcr.io/antflydb/antfly-operator:${tag}
          done

      # Sign Google Artifact Registry images with keyless OIDC
      - name: Sign GAR container images with annotations (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for tag in latest "${VERSION}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ${{ env.GCP_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT }}/${{ env.GCP_REPOSITORY }}/${{ env.IMAGE_NAME }}:${tag}
          done
