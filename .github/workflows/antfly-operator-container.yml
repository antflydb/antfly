name: Antfly Operator Container

on:
  push:
    tags:
      - "pkg/operator/v*"

env:
  GCP_REGION: us-east5
  GCP_PROJECT: antfly-image-artifacts
  GCP_REPOSITORY: antfly-labs
  IMAGE_NAME: antfly-operator
  CLOUD_BUILD_WORKER_POOL: projects/antfly-image-artifacts/locations/us-east5/workerPools/antfly-container-builders

jobs:
  publish:
    runs-on: arc-antfly-publish
    environment: container-publish
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#pkg/operator/}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Extracted version: ${VERSION}"

      - name: Build and push GAR image with Cloud Build
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gcloud builds submit . \
            --project="${GCP_PROJECT}" \
            --region="${GCP_REGION}" \
            --worker-pool="${CLOUD_BUILD_WORKER_POOL}" \
            --config=cloudbuild.yaml \
            --substitutions="_IMAGE_NAME=${IMAGE_NAME},_DOCKERFILE=Dockerfile.antfly-operator,_CONTEXT=.,_ALIAS_TAG=latest,_VERSION_TAG=${VERSION},_CACHE_TAG=buildcache,_DESCRIPTION=Kubernetes operator for deploying and managing AntflyDB clusters multi-arch image"

      - name: Install crane
        uses: imjasonh/setup-crane@v0.4

      - name: Mirror image GAR -> GHCR
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "${{ steps.auth.outputs.access_token }}" | crane auth login "${GCP_REGION}-docker.pkg.dev" -u oauth2accesstoken --password-stdin
          echo "${{ secrets.GITHUB_TOKEN }}" | crane auth login ghcr.io -u "${{ github.actor }}" --password-stdin
          for tag in latest "${VERSION}"; do
            crane copy \
              "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${GCP_REPOSITORY}/${IMAGE_NAME}:${tag}" \
              "ghcr.io/antflydb/antfly-operator:${tag}"
          done

      - uses: sigstore/cosign-installer@v3

      - name: Sign container images with annotations (keyless)
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for tag in latest "${VERSION}"; do
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              ghcr.io/antflydb/antfly-operator:${tag}
            cosign sign --yes \
              -a "repo=${{ github.repository }}" \
              -a "workflow=${{ github.workflow }}" \
              -a "ref=${{ github.sha }}" \
              "${GCP_REGION}-docker.pkg.dev/${GCP_PROJECT}/${GCP_REPOSITORY}/${IMAGE_NAME}:${tag}"
          done
