# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "go/Dockerfile*"
      - "zig/**"
      - "ts/**"
      - "py/**"
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/operator/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/zig-*.yml"
      - ".github/workflows/ts-*.yml"
      - ".github/workflows/py-*.yml"
      - ".github/workflows/antfly-operator-*.yml"
      - ".github/workflows/antfly-proxy-*.yml"
      - ".github/workflows/antfly-container.yml"
      - ".github/workflows/trigger-docs-build.yml"
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "*.md"
      - "docs/**"
      - "go/Dockerfile*"
      - "zig/**"
      - "ts/**"
      - "py/**"
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/operator/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/zig-*.yml"
      - ".github/workflows/ts-*.yml"
      - ".github/workflows/py-*.yml"
      - ".github/workflows/antfly-operator-*.yml"
      - ".github/workflows/antfly-proxy-*.yml"
      - ".github/workflows/antfly-container.yml"
      - ".github/workflows/trigger-docs-build.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  TOKENIZERS_VERSION: "1.26.0"
  ONNXRUNTIME_VERSION: "1.24.3"
  GENAI_VERSION: "0.12.1"
  PJRT_CPU_VERSION: "0.83.1"

jobs:
  unit:
    # Runs on heavy because the standard runner's 10Gi ephemeral cap was
    # being exhausted by go build + module cache + workspace + Pebble dbs
    # written during "Test swarm startup", leading to silent SIGTERM.
    # Heavy provides /mnt/cache (50Gi PVC) for GOCACHE/GOMODCACHE.
    runs-on: arc-antfly-heavy
    env:
      GOCACHE: /mnt/cache/go-build
      GOMODCACHE: /mnt/cache/go-mod
    steps:
      - name: Prepare cache directories
        run: |
          set -eux
          mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0

      - name: Set Go experiment
        run: echo "GOEXPERIMENT=simd" >> $GITHUB_ENV

      - name: Verify Go version
        run: go version

      - name: Configure Go for private modules
        run: |
          echo "GONOPROXY=github.com/antflydb/antfly" >> $GITHUB_ENV
          echo "GOPRIVATE=github.com/antflydb/antfly" >> $GITHUB_ENV

      - name: Verify Go module tidiness
        run: make tidy-check

      - name: Verify Go modules
        run: cd go/pkg/antfly && GOWORK=off go mod download

      - name: Verify generated OpenAPI clients
        run: |
          make build-docs
          (cd go/pkg/sdk && GOWORK=off go generate ./...)
          status="$(git status --porcelain -- \
            openapi.yaml \
            go/pkg/sdk/oapi/client.gen.go)"
          if [ -n "$status" ]; then
            echo "$status"
            exit 1
          fi

      - name: Build Antfly
        run: cd go/pkg/antfly && GOWORK=off go build -v -o ../../../antfly ./cmd

      - name: Test swarm startup
        run: |
          ./antfly swarm &
          SWARM_PID=$!

          echo "Waiting for swarm to start (PID: $SWARM_PID)..."

          HEALTHZ_OK=false
          for i in {1..30}; do
            if curl -sf http://localhost:4200/healthz > /dev/null 2>&1; then
              echo "healthz endpoint ready after ${i}s"
              HEALTHZ_OK=true
              break
            fi
            sleep 1
          done

          if [ "$HEALTHZ_OK" != "true" ]; then
            echo "ERROR: healthz endpoint did not respond within 30 seconds"
            kill $SWARM_PID 2>/dev/null || true
            exit 1
          fi

          READYZ_OK=false
          for i in {1..30}; do
            if curl -sf http://localhost:4200/readyz > /dev/null 2>&1; then
              echo "readyz endpoint ready after ${i}s"
              READYZ_OK=true
              break
            fi
            sleep 1
          done

          if [ "$READYZ_OK" != "true" ]; then
            echo "ERROR: readyz endpoint did not respond within 30 seconds"
            kill $SWARM_PID 2>/dev/null || true
            exit 1
          fi

          echo "Swarm startup test passed!"
          kill $SWARM_PID 2>/dev/null || true
          wait $SWARM_PID 2>/dev/null || true

      - name: Test
        run: |
          packages=()
          while IFS= read -r pkg; do
            if [ "$pkg" != "github.com/antflydb/antfly/go/pkg/antfly/src/sim" ]; then
              packages+=("$pkg")
            fi
          done < <(cd go/pkg/antfly && GOWORK=off go list ./...)
          (cd go/pkg/antfly && GOWORK=off go test -v "${packages[@]}")

      - name: Build termite (pure Go)
        env:
          CGO_ENABLED: "0"
        run: |
          for mod in go/pkg/termite go/pkg/sdk; do
            (cd $mod && GOWORK=off go build -v ./...)
          done

      - name: Test termite (pure Go)
        env:
          CGO_ENABLED: "0"
        run: |
          for mod in go/pkg/termite go/pkg/sdk; do
            (cd $mod && GOWORK=off go test -v ./...)
          done

  sim-validate:
    runs-on: arc-antfly-heavy
    # sim-validate runs `go test ./go/pkg/antfly/src/sim` under a wrapper; on the 4-cpu
    # standard runner with no /mnt/cache, it tipped past the 10Gi ephemeral
    # cap (or hit some pod-level cancel) ~3:30 in. Move it to heavy where
    # GOCACHE/GOMODCACHE land on the 50Gi cache PVC and there's enough CPU
    # for the sim's parallel scenarios.
    env:
      GOCACHE: /mnt/cache/go-build
      GOMODCACHE: /mnt/cache/go-mod
    steps:
      - name: Prepare cache directories
        run: |
          set -eux
          mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Set Go experiment
        run: echo "GOEXPERIMENT=simd" >> $GITHUB_ENV

      - name: Configure Go for private modules
        run: |
          echo "GONOPROXY=github.com/antflydb/antfly" >> $GITHUB_ENV
          echo "GOPRIVATE=github.com/antflydb/antfly" >> $GITHUB_ENV

      - name: Verify Go modules
        run: cd go/pkg/antfly && GOWORK=off go mod download

      - name: Simulator Validate
        run: make sim-validate

  e2e:
    runs-on: arc-antfly-heavy
    needs: unit
    # The heavy profile mounts a 50Gi ephemeral PVC at /mnt/cache so large
    # caches (Go build/module cache, HuggingFace downloads, Termite models)
    # live outside the pod's 10Gi Autopilot ephemeral-storage allotment.
    env:
      GOCACHE: /mnt/cache/go-build
      GOMODCACHE: /mnt/cache/go-mod
      HF_HOME: /mnt/cache/huggingface
      TERMITE_HOME: /mnt/cache/termite-home
    steps:
      - name: Prepare cache directories
        run: |
          set -eux
          mkdir -p "$GOCACHE" "$GOMODCACHE" "$HF_HOME" "$TERMITE_HOME"
          # HuggingFace downloader falls back to $HOME/.cache/huggingface;
          # symlink $HOME/.cache to the cache volume to keep the ~5Gi ONNX
          # downloads off the runner's 10Gi root ephemeral disk.
          mkdir -p /mnt/cache/home-cache
          rm -rf "$HOME/.cache"
          ln -sfn /mnt/cache/home-cache "$HOME/.cache"
          # Termite copies final models into $HOME/.termite/models by
          # default; redirect the whole $HOME/.termite onto the cache volume
          # so the copied payload lands there too.
          rm -rf "$HOME/.termite"
          ln -sfn "$TERMITE_HOME" "$HOME/.termite"

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential

      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Set Go experiment
        run: echo "GOEXPERIMENT=simd" >> $GITHUB_ENV

      - name: Verify Go version
        run: go version

      # Install PostgreSQL 18 natively on the runner pod. `services:` blocks
      # would normally handle this, but they require ARC containerMode:
      # kubernetes, which on GKE Autopilot runs the runner and the job
      # container in separate co-located pods sharing an RWO PVC. The node
      # co-location + Autopilot's privileged-container restriction + the 1TB
      # minimum for RWX Filestore make that path impractical here, so we
      # install postgres locally instead.
      - name: Install and start PostgreSQL 18
        run: |
          set -eux
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -fsSL -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc \
            https://www.postgresql.org/media/keys/ACCC4CF8.asc
          echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" \
            | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-18
          sudo pg_ctlcluster 18 main start
          sudo -u postgres psql -c "CREATE USER antfly WITH PASSWORD 'antfly_dev';"
          sudo -u postgres psql -c "CREATE DATABASE antfly_test OWNER antfly;"
          pg_isready -h 127.0.0.1 -U antfly -d antfly_test

      - name: Verify Go modules
        run: cd go/pkg/antfly && GOWORK=off go mod download

      - name: Disk usage before E2E
        run: |
          set -x
          df -h / /mnt/cache || true
          du -xh -d 1 "$HOME" 2>/dev/null | sort -hr | head -20 || true

      - name: E2E Tests
        env:
          RUN_PG_TESTS: "true"
          ANTFLY_E2E_PG_DSN: postgres://antfly:antfly_dev@127.0.0.1:5432/antfly_test?sslmode=disable
        run: |
          make e2e E2E_TIMEOUT=45m

  omni:
    # Omni combines ONNX (CGO) and XLA (CGO) backends and needs GLIBC 2.38+.
    # ARC's actions-runner image now runs on Ubuntu 24.04, so this can run
    # directly on the heavy runner without a kubernetesMode job container.
    runs-on: arc-antfly-heavy
    env:
      GOCACHE: /mnt/cache/go-build
      GOMODCACHE: /mnt/cache/go-mod
    steps:
      - name: Prepare cache directories
        run: |
          set -eux
          mkdir -p "$GOCACHE" "$GOMODCACHE"

      - name: Verify runner image
        run: |
          cat /etc/os-release
          ldd --version
          sudo -n true

      - name: Install container prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y git ca-certificates curl

      - uses: actions/checkout@v6

      - name: Configure Git safe directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Set GOEXPERIMENT
        run: echo "GOEXPERIMENT=simd" >> $GITHUB_ENV

      - name: Verify Go version
        run: go version

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential pkg-config curl git ca-certificates

      - name: Download libtokenizers
        run: |
          ARCH=$([ "$(uname -m)" = "aarch64" ] && echo "arm64" || echo "amd64")
          curl -fsSL "https://github.com/daulet/tokenizers/releases/download/v${TOKENIZERS_VERSION}/libtokenizers.linux-${ARCH}.tar.gz" \
            | sudo tar -xzf - -C /usr/local/lib
          sudo ldconfig

      - name: Download ONNX Runtime
        run: |
          ARCH=$([ "$(uname -m)" = "aarch64" ] && echo "aarch64" || echo "x64")
          mkdir -p "$RUNNER_TEMP/onnxruntime"
          curl -fsSL "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-${ARCH}-${ONNXRUNTIME_VERSION}.tgz" \
            | tar -xzf - --strip-components=1 -C "$RUNNER_TEMP/onnxruntime"
          echo "CGO_CFLAGS=-I$RUNNER_TEMP/onnxruntime/include" >> $GITHUB_ENV
          echo "CGO_LDFLAGS=-L$RUNNER_TEMP/onnxruntime/lib -lonnxruntime" >> $GITHUB_ENV
          echo "LD_LIBRARY_PATH=$RUNNER_TEMP/onnxruntime/lib:/usr/local/lib" >> $GITHUB_ENV
          echo "ORT_DYLIB_PATH=$RUNNER_TEMP/onnxruntime/lib/libonnxruntime.so" >> $GITHUB_ENV

      - name: Download ONNX Runtime GenAI
        run: |
          ARCH=$([ "$(uname -m)" = "aarch64" ] && echo "arm64" || echo "x64")
          mkdir -p "$RUNNER_TEMP/onnxruntime-genai"
          curl -fsSL "https://github.com/microsoft/onnxruntime-genai/releases/download/v${GENAI_VERSION}/onnxruntime-genai-${GENAI_VERSION}-linux-${ARCH}.tar.gz" \
            | tar -xzf - --strip-components=1 -C "$RUNNER_TEMP/onnxruntime-genai"
          cp "$RUNNER_TEMP/onnxruntime-genai/lib"/libonnxruntime-genai*.so* "$RUNNER_TEMP/onnxruntime/lib/" 2>/dev/null || true
          echo "ORTGENAI_DYLIB_PATH=$RUNNER_TEMP/onnxruntime/lib/libonnxruntime-genai.so" >> $GITHUB_ENV

      - name: Download PJRT CPU plugin
        run: |
          sudo mkdir -p /usr/local/lib/go-xla
          curl -fsSL "https://github.com/gomlx/pjrt-cpu-binaries/releases/download/v${PJRT_CPU_VERSION}/pjrt_cpu_linux_amd64.tar.gz" \
            | sudo tar -xzf - -C /usr/local/lib/go-xla
          sudo ldconfig
          echo "LD_LIBRARY_PATH=/usr/local/lib/go-xla:$RUNNER_TEMP/onnxruntime/lib:/usr/local/lib" >> $GITHUB_ENV
          echo "GOMLX_BACKEND=xla:cpu" >> $GITHUB_ENV

      - name: Download dependencies
        run: cd go/pkg/termite && GOWORK=off go mod download

      - name: Build termite (omni)
        env:
          CGO_ENABLED: "1"
        run: cd go/pkg/termite && GOWORK=off go build -v -tags="onnx,ORT,xla,XLA" ./...

      - name: Test termite (omni)
        env:
          CGO_ENABLED: "1"
        run: cd go/pkg/termite && GOWORK=off go test -v -tags="onnx,ORT,xla,XLA" ./...
