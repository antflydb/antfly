# Combined proxy CI: tests, builds, and smoke-runs the antfly-proxy and
# termite-proxy modules. Both are pure-Go submodules with no native deps,
# so they share one runner pod.

name: Proxy Tests

on:
  push:
    branches: ["main"]
    paths:
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/antfly-proxy-go.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/antfly-proxy-go.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  proxies:
    runs-on: arc-antfly-standard
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Test antfly-proxy
        run: cd go/pkg/proxy/antfly && GOWORK=off go test ./...

      - name: Build antfly-proxy
        run: cd go/pkg/proxy/antfly && GOWORK=off go build -v -o ../../../../antfly-proxy ./cmd/antfly-proxy

      - name: Smoke test antfly-proxy
        run: timeout 2 ./antfly-proxy || [ $? -eq 124 ]

      - name: Test termite-proxy
        run: cd go/pkg/proxy/termite && GOWORK=off go test ./...

      - name: Build termite-proxy
        run: cd go/pkg/proxy/termite && GOWORK=off go build -v -o ../../../../termite-proxy ./cmd/termite-proxy

      - name: Smoke test termite-proxy
        run: timeout 2 ./termite-proxy || [ $? -eq 124 ]
