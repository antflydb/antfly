# Combined proxy CI for the antfly and termite proxy library modules.

name: Proxy Tests

on:
  push:
    branches: ["main"]
    paths:
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/antfly-proxy-go.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "go/pkg/proxy/antfly/**"
      - "go/pkg/proxy/termite/**"
      - ".github/workflows/antfly-proxy-go.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  proxies:
    runs-on: arc-antfly-standard
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"
          cache: false

      - name: Test antfly-proxy
        run: cd go/pkg/proxy/antfly && GOWORK=off go test ./...

      - name: Test termite-proxy
        run: cd go/pkg/proxy/termite && GOWORK=off go test ./...
