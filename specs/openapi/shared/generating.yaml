openapi: 3.0.3
info:
  title: Generator Provider Configuration
  description: "An OpenAPI specification for configuring different generative AI providers in AntflyDB."
  version: "0.0.1"
components:
  schemas:
    GeneratorProvider:
      type: string
      enum:
        - gemini
        - vertex
        - ollama
        - openai
        - openrouter
        - bedrock
        - anthropic
        - cohere
        - antfly
        - mock
      description: "The generative AI provider to use."

    GeneratorConfig:
      description: |
        A unified configuration for a generative AI provider.
      allOf:
        - oneOf:
            - $ref: "#/components/schemas/GoogleGeneratorConfig"
            - $ref: "#/components/schemas/VertexGeneratorConfig"
            - $ref: "#/components/schemas/OllamaGeneratorConfig"
            - $ref: "#/components/schemas/AntflyGeneratorConfig"
            - $ref: "#/components/schemas/OpenAIGeneratorConfig"
            - $ref: "#/components/schemas/OpenRouterGeneratorConfig"
            - $ref: "#/components/schemas/BedrockGeneratorConfig"
            - $ref: "#/components/schemas/AnthropicGeneratorConfig"
            - $ref: "#/components/schemas/CohereGeneratorConfig"
        - properties:
            provider:
              $ref: "#/components/schemas/GeneratorProvider"
          required:
            - provider
      example:
        provider: "openai"
        model: "gpt-4.1"
        temperature: 0.7
        max_tokens: 2048

    RetryConfig:
      type: object
      description: "Retry configuration for generator calls"
      properties:
        max_attempts:
          type: integer
          default: 3
          minimum: 1
          maximum: 10
          description: "Maximum number of retry attempts"
        initial_backoff_ms:
          type: integer
          default: 1000
          minimum: 100
          description: "Initial backoff delay in milliseconds"
        backoff_multiplier:
          type: number
          format: float
          default: 2.0
          minimum: 1.0
          maximum: 5.0
          description: "Multiplier for exponential backoff"
        max_backoff_ms:
          type: integer
          default: 30000
          description: "Maximum backoff delay in milliseconds"

    ChainCondition:
      type: string
      enum: ["always", "on_error", "on_timeout", "on_rate_limit"]
      default: "on_error"
      description: |
        Condition for trying the next generator in chain:
        - always: Always try next regardless of outcome
        - on_error: Try next on any error (default)
        - on_timeout: Try next only on timeout errors
        - on_rate_limit: Try next only on rate limit errors

    ChainLink:
      type: object
      description: "A single link in a generator chain with optional retry and condition"
      required:
        - generator
      properties:
        generator:
          $ref: "#/components/schemas/GeneratorConfig"
        retry:
          $ref: "#/components/schemas/RetryConfig"
          description: "Retry configuration for this generator"
        condition:
          $ref: "#/components/schemas/ChainCondition"
          description: "When to try the next generator in chain"

    ChatMessageRole:
      type: string
      enum: ["user", "assistant", "system", "tool"]
      description: "Role of the message sender in a generation/chat conversation"

    TextContentPart:
      type: object
      description: Text content for multimodal input.
      required:
        - type
        - text
      properties:
        type:
          type: string
          enum:
            - text
        text:
          type: string
          description: Text content.

    ImageURL:
      type: object
      description: Image URL or data URI.
      required:
        - url
      properties:
        url:
          type: string
          description: URL or data URI (data:image/png;base64,...).
          example: data:image/png;base64,iVBORw0KGgo...

    ImageURLContentPart:
      type: object
      description: Image content in OpenAI-compatible format.
      required:
        - type
        - image_url
      properties:
        type:
          type: string
          enum:
            - image_url
        image_url:
          $ref: "#/components/schemas/ImageURL"

    MediaContentPart:
      type: object
      description: Inline binary media content (audio, image, etc.).
      required:
        - type
        - data
        - mime_type
      properties:
        type:
          type: string
          enum:
            - media
        data:
          type: string
          format: byte
          description: Base64-encoded binary data.
        mime_type:
          type: string
          description: MIME type (audio/wav, image/gif, image/png, etc.).

    ContentPart:
      description: A content part for multimodal input (text, image URL, or inline media).
      oneOf:
        - $ref: "#/components/schemas/TextContentPart"
        - $ref: "#/components/schemas/ImageURLContentPart"
        - $ref: "#/components/schemas/MediaContentPart"

    ChatMessageContent:
      x-go-type: stdjson.RawMessage
      x-go-type-import:
        path: encoding/json
        name: stdjson
      description: |
        Message content. Supports two formats:
        - Simple string: "Hello, how are you?"
        - Array of content parts: [{"type": "text", "text": "Hello"}]
      oneOf:
        - type: string
          description: Simple text content.
        - type: array
          description: Array of multimodal content parts.
          items:
            $ref: "#/components/schemas/ContentPart"

    ToolCall:
      type: object
      description: "OpenAI-compatible assistant tool call."
      required:
        - id
        - type
        - function
      properties:
        id:
          type: string
          description: "Tool call identifier."
        type:
          type: string
          enum:
            - function
        function:
          $ref: "#/components/schemas/ToolCallFunction"

    ToolCallFunction:
      type: object
      description: "The function called by a model tool call."
      required:
        - name
        - arguments
      properties:
        name:
          type: string
          description: "Function name."
        arguments:
          type: string
          description: "JSON string of function arguments."

    ChatMessage:
      type: object
      description: "OpenAI-compatible message in a generation/chat conversation."
      required:
        - role
      properties:
        role:
          $ref: "#/components/schemas/ChatMessageRole"
        content:
          $ref: "#/components/schemas/ChatMessageContent"
        tool_calls:
          type: array
          items:
            $ref: "#/components/schemas/ToolCall"
          description: "Tool calls made by the assistant (only for role=assistant)."
        tool_call_id:
          type: string
          description: "ID of the tool call this message responds to (only for role=tool)."
        name:
          type: string
          description: "Optional tool name for tool messages when model templates need it."

    GoogleGeneratorConfig:
      type: object
      description: |
        Configuration for the Google generative AI provider (Gemini).
      properties:
        project_id:
          type: string
          description: "The Google Cloud project ID."
        location:
          type: string
          description: "The Google Cloud location (e.g., 'us-central1')."
        model:
          type: string
          description: "The name of the generative model to use."
          default: "gemini-2.5-flash"
          example: "gemini-2.5-flash"
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
        api_key:
          type: string
          description: "The Google API key."
        url:
          type: string
          format: uri
          description: "The URL of the Google API endpoint."
      required:
        - model

    VertexGeneratorConfig:
      type: object
      description: |
        Configuration for Google Cloud Vertex AI generative models.
      properties:
        model:
          type: string
          description: "The name of the Vertex AI model to use."
          default: "gemini-2.5-flash"
          example: "gemini-2.5-flash"
        project_id:
          type: string
          description: "Google Cloud project ID."
        location:
          type: string
          description: "Google Cloud region for Vertex AI API."
          default: "us-central1"
        credentials_path:
          type: string
          description: "Path to service account JSON key file."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate in the response."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
      required:
        - model

    OllamaGeneratorConfig:
      type: object
      description: |
        Configuration for the Ollama generative AI provider.
      properties:
        model:
          type: string
          description: "The name of the Ollama model to use."
          example: "llama3.3:70b"
        url:
          type: string
          format: uri
          description: "The URL of the Ollama API endpoint."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
        timeout:
          type: integer
          description: "HTTP response timeout in seconds for Ollama API calls."
          minimum: 1
      required:
        - model

    AntflyGeneratorConfig:
      type: object
      description: |
        Configuration for the Antfly inference generative AI provider.
      properties:
        model:
          type: string
          description: "The name of the generator model."
          example: "onnxruntime/Gemma-3-ONNX"
        api_url:
          type: string
          format: uri
          description: "The URL of the Inference API endpoint. Can also be set via ANTFLY_INFERENCE_URL environment variable."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
        timeout:
          type: integer
          description: "HTTP response timeout in seconds for Inference API calls."
          minimum: 1
      required:
        - model

    OpenAIGeneratorConfig:
      type: object
      description: |
        Configuration for the OpenAI generative AI provider.
      properties:
        model:
          type: string
          description: "The name of the OpenAI model to use."
          default: "gpt-4.1"
          example: "gpt-4.1"
        url:
          type: string
          format: uri
          description: "The URL of the OpenAI API endpoint."
        api_key:
          type: string
          description: "The OpenAI API key."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter."
          minimum: 0.0
          maximum: 1.0
        frequency_penalty:
          type: number
          format: float
          description: "Penalty for token frequency (-2.0 to 2.0)."
          minimum: -2.0
          maximum: 2.0
        presence_penalty:
          type: number
          format: float
          description: "Penalty for token presence (-2.0 to 2.0)."
          minimum: -2.0
          maximum: 2.0
      required:
        - model

    BedrockGeneratorConfig:
      type: object
      description: |
        Configuration for the AWS Bedrock generative AI provider.
      properties:
        model:
          type: string
          description: "The Bedrock model ID to use."
          example: "anthropic.claude-sonnet-4-5-20250929-v1:0"
        region:
          type: string
          description: "The AWS region for the Bedrock service."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
      required:
        - model

    AnthropicGeneratorConfig:
      type: object
      description: |
        Configuration for the Anthropic generative AI provider.
      properties:
        model:
          type: string
          description: "The full model ID of the Anthropic model to use."
          default: "claude-sonnet-4-5-20250929"
          example: "claude-sonnet-4-5-20250929"
        api_key:
          type: string
          description: "The Anthropic API key."
        url:
          type: string
          format: uri
          description: "The URL of the Anthropic API endpoint."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate in the response."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
      required:
        - model

    CohereGeneratorConfig:
      type: object
      description: |
        Configuration for the Cohere generative AI provider.
      properties:
        model:
          type: string
          description: "The name of the Cohere model to use."
          default: "command-r-plus"
          example: "command-r-plus"
        api_key:
          type: string
          description: "The Cohere API key."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate in the response."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        top_k:
          type: integer
          description: "Top-k sampling parameter."
        frequency_penalty:
          type: number
          format: float
          description: "Penalty for token frequency (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        presence_penalty:
          type: number
          format: float
          description: "Penalty for token presence (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
      required:
        - model

    OpenRouterGeneratorConfig:
      type: object
      description: |
        Configuration for the OpenRouter generative AI provider.
      properties:
        model:
          type: string
          description: "Single model identifier. Either model or models must be provided."
          example: "openai/gpt-4.1"
        models:
          type: array
          items:
            type: string
          description: |
            Array of model identifiers for fallback routing. Either model or models must be provided.
        api_key:
          type: string
          description: "The OpenRouter API key."
        temperature:
          type: number
          format: float
          description: "Controls randomness in generation (0.0-2.0)."
          minimum: 0.0
          maximum: 2.0
        max_tokens:
          type: integer
          description: "Maximum number of tokens to generate in the response."
        top_p:
          type: number
          format: float
          description: "Nucleus sampling parameter (0.0-1.0)."
          minimum: 0.0
          maximum: 1.0
        frequency_penalty:
          type: number
          format: float
          description: "Penalty for token frequency (-2.0 to 2.0)."
          minimum: -2.0
          maximum: 2.0
        presence_penalty:
          type: number
          format: float
          description: "Penalty for token presence (-2.0 to 2.0)."
          minimum: -2.0
          maximum: 2.0
