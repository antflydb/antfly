\* TLC model checking configuration for AntflySnapshotTransfer
\* Run: java -cp tla2tools.jar tlc2.TLC SnapshotTransferMC.tla -config AntflySnapshotTransfer.cfg -workers auto -deadlock

\* Use the SnapshotTransferMC module which extends AntflySnapshotTransfer with concrete constants
\* Note: run TLC against SnapshotTransferMC.tla, not AntflySnapshotTransfer.tla directly

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    Nodes       <- MCNodes
    MaxRetries  <- MCMaxRetries
    MaxSnapshots <- MCMaxSnapshots

SPECIFICATION Spec

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    AppliedSnapshotIsValid
    GCSafety
    RetryBound
    NoFetchingWithoutNeed
    SnapshotIDsMonotonic

\* Liveness properties checked under fairness
PROPERTIES
    EventualTransferResolution
    EventualPermanentDetection
