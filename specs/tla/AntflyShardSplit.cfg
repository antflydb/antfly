\* TLC model checking configuration for AntflyShardSplit
\* Run: java -cp tla2tools.jar tlc2.TLC ShardSplitMC.tla -config AntflyShardSplit.cfg -workers auto -deadlock

\* Use the ShardSplitMC module which extends AntflyShardSplit with concrete constants
\* Note: run TLC against ShardSplitMC.tla, not AntflyShardSplit.tla directly

CONSTANTS
    k1 = k1
    k2 = k2
    k3 = k3
    Keys       <- MCKeys
    ParentKeys <- MCParentKeys
    ChildKeys  <- MCChildKeys

SPECIFICATION Spec

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    NoDataLoss
    NoDoubleServing
    RollbackRestoresRange
    ByteRangeNarrowsBeforeArchive
    DeltaReplayIntegrity
    DeltaKeysOnlyDuringSplit
    NoPrematureCutover
    FenceRequiresActiveSplit
    ReadAlwaysAvailable

\* Liveness properties checked under fairness
PROPERTIES
    EventualSplitCompletion
