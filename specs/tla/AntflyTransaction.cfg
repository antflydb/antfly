\* TLC model checking configuration for AntflyTransaction
\* Run: java -cp tla2tools.jar tlc2.TLC MC.tla -config AntflyTransaction.cfg -workers auto -deadlock

\* Use the MC module which extends AntflyTransaction with concrete constants
\* Note: run TLC against MC.tla, not AntflyTransaction.tla directly

CONSTANTS
    t1 = t1
    t2 = t2
    s1 = s1
    s2 = s2
    k1 = k1
    k2 = k2
    Txns        <- MCTxns
    Shards      <- MCShards
    Keys        <- MCKeys
    TxnShards   <- MCTxnShards
    TxnKeys     <- MCTxnKeys
    TxnReadSet  <- MCTxnReadSet
    TxnCoord    <- MCTxnCoord
    MaxTimestamp <- MCMaxTimestamp
    StalePendingThreshold <- MCStalePendingThreshold

SPECIFICATION Spec

CONSTRAINT StateConstraint

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    AtomicityInvariant
    NoOrphanedIntents
    OCCSerializationInvariant
    LWWConsistency
    SerializableReads

\* Liveness properties checked under fairness
PROPERTIES
    EventualCompletion
    EventualCleanup
    EventualDecision
    EventualPendingResolution
