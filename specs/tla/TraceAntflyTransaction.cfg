\* TLC configuration for trace validation of AntflyTransaction.
\*
\* Usage:
\*   env JSON=trace.ndjson java -cp tla2tools.jar:CommunityModules-deps.jar \
\*     tlc2.TLC TraceAntflyTransaction -config TraceAntflyTransaction.cfg \
\*     -workers 1 -lncheck final
\*
\* Constants must match the trace being validated. Override via MC module
\* or define them here for a specific trace.

CONSTANTS
    t1 = t1
    t2 = t2
    s1 = s1
    s2 = s2
    k1 = k1
    k2 = k2
    Txns        <- MCTxns
    Shards      <- MCShards
    Keys        <- MCKeys
    TxnShards   <- MCTxnShards
    TxnKeys     <- MCTxnKeys
    TxnReadSet  <- MCTxnReadSet
    TxnCoord    <- MCTxnCoord
    MaxTimestamp <- MCMaxTimestamp
    StalePendingThreshold <- MCStalePendingThreshold

SPECIFICATION TraceSpec

VIEW TraceView

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    AtomicityInvariant
    NoOrphanedIntents
    OCCSerializationInvariant
    LWWConsistency

\* Liveness: the entire trace must be consumed
PROPERTIES
    TraceMatched
