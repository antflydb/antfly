\* Safety-only TLC configuration for AntflySnapshotTransfer
\* Checks invariants without temporal properties (fast).
\* Run: java -cp tla2tools.jar tlc2.TLC SnapshotTransferMC.tla -config AntflySnapshotTransfer-safety.cfg -workers auto -deadlock

CONSTANTS
    n1 = n1
    n2 = n2
    n3 = n3
    Nodes       <- MCNodes
    MaxRetries  <- MCMaxRetries
    MaxSnapshots <- MCMaxSnapshots

SPECIFICATION Spec

\* Safety invariants checked at every reachable state
INVARIANTS
    TypeOK
    AppliedSnapshotIsValid
    GCSafety
    RetryBound
    NoFetchingWithoutNeed
    SnapshotIDsMonotonic
