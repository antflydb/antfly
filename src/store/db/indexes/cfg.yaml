# yaml-language-server: $schema=https://raw.githubusercontent.com/oapi-codegen/oapi-codegen/HEAD/configuration-schema.json
package: indexes
generate:
  std-http-server: true
  embedded-spec: true
  models: true
compatibility:
  always-prefix-enum-values: true
output: openapi.gen.go
output-options:
  skip-prune: true
  prefer-skip-optional-pointer: false
  prefer-skip-optional-pointer-with-omitzero: false
import-mapping:
  ../../../../lib/embeddings/openapi.yaml: github.com/antflydb/antfly/lib/embeddings
  ../../../../pkg/generating/openapi.yaml: github.com/antflydb/antfly/pkg/generating
  ../../../../lib/chunking/openapi.yaml: github.com/antflydb/antfly/lib/chunking
