edition = "2023";

package common;
import "google/protobuf/go_features.proto";

option go_package = "github.com/antflydb/antfly/src/store";
option features.(pb.go).api_level = API_OPAQUE;

// StoreState represents the health state of a store
enum StoreState {
  Unknown = 0;
  Healthy = 1;
  Unhealthy = 2;
  Gone = 3;

  Registered = 4;
  Terminating = 5;
  Terminated = 6;
}

