---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: antflyrestores.antfly.io
spec:
  group: antfly.io
  names:
    kind: AntflyRestore
    listKind: AntflyRestoreList
    plural: antflyrestores
    singular: antflyrestore
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.clusterRef.name
      name: Cluster
      type: string
    - jsonPath: .spec.source.backupId
      name: Backup ID
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1
    schema:
      openAPIV3Schema:
        description: AntflyRestore is the Schema for on-demand Antfly restores
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AntflyRestoreSpec defines the desired state of AntflyRestore
            properties:
              backoffLimit:
                default: 3
                description: 'BackoffLimit specifies the number of retries before
                  marking restore as failed (default: 3)'
                format: int32
                minimum: 0
                type: integer
              clusterRef:
                description: ClusterRef references the target AntflyCluster to restore
                  to
                properties:
                  name:
                    description: Name of the AntflyCluster
                    type: string
                  namespace:
                    description: Namespace of the AntflyCluster (defaults to same
                      namespace as this resource)
                    type: string
                required:
                - name
                type: object
              restoreMode:
                default: fail_if_exists
                description: RestoreMode defines behavior when tables exist
                enum:
                - fail_if_exists
                - skip_if_exists
                - overwrite
                type: string
              restoreTimeout:
                description: 'RestoreTimeout is max duration for the restore operation
                  (default: 2h)'
                type: string
              source:
                description: Source defines where to restore from
                properties:
                  backupId:
                    description: BackupID identifies which backup to restore
                    type: string
                  credentialsSecret:
                    description: |-
                      CredentialsSecret references a Secret containing storage credentials
                      For S3: expects keys AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, and optionally AWS_REGION
                    properties:
                      name:
                        description: Name of the Secret
                        type: string
                    required:
                    - name
                    type: object
                  location:
                    description: |-
                      Location is the backup source URL
                      Supports: s3://bucket/path or file:///path
                    pattern: ^(s3://|file://).+
                    type: string
                required:
                - backupId
                - location
                type: object
              tables:
                description: Tables to restore (nil = all tables from backup)
                items:
                  type: string
                type: array
            required:
            - clusterRef
            - source
            type: object
          status:
            description: AntflyRestoreStatus defines the observed state of AntflyRestore
            properties:
              completionTime:
                description: CompletionTime when restore finished
                format: date-time
                type: string
              conditions:
                description: Conditions represent the current state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              jobName:
                description: JobName is the name of the Job executing this restore
                type: string
              message:
                description: Message provides details about current state
                type: string
              phase:
                description: Phase of the restore operation
                type: string
              startTime:
                description: StartTime when restore began
                format: date-time
                type: string
              tables:
                description: Tables tracks per-table restore status
                items:
                  description: TableRestoreStatus tracks restore status per table
                  properties:
                    error:
                      description: Error message if failed
                      type: string
                    name:
                      description: Name of the table
                      type: string
                    status:
                      description: 'Status: Pending, Restoring, Completed, Failed,
                        Skipped'
                      type: string
                  required:
                  - name
                  - status
                  type: object
                type: array
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
