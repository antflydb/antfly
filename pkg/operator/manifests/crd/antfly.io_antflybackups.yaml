            properties:
              conditions:
                description: Conditions represent the current state
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              cronJobName:
                description: CronJobName is the name of the CronJob managing this
                  backup
                type: string
              lastScheduledTime:
                description: LastScheduledTime is when the last backup was scheduled
                format: date-time
                type: string
              lastSuccessfulBackup:
                description: LastSuccessfulBackup records the most recent successful
                  backup
                properties:
                  backupId:
                    description: BackupID is the unique identifier for this backup
                    type: string
                  completionTime:
                    description: CompletionTime when backup completed (nil if still
                      running)
                    format: date-time
                    type: string
                  error:
                    description: Error message if failed
                    type: string
                  startTime:
                    description: StartTime when backup started
                    format: date-time
                    type: string
                  status:
                    description: 'Status of this backup: Running, Completed, Failed'
                    type: string
                  tables:
                    description: Tables that were backed up
                    items:
                      type: string
                    type: array
                required:
                - backupId
                - startTime
                - status
                type: object
              nextScheduledBackup:
                description: NextScheduledBackup is the next planned backup time
                format: date-time
                type: string
              observedGeneration:
                description: |-
                  ObservedGeneration is the most recent generation observed by the controller.
                  Used to detect spec changes when the backup is in a Failed state,
                  allowing the controller to re-validate after user corrections.
                format: int64
                type: integer
              phase:
                description: Phase of the backup schedule
                type: string
              recentBackups:
                description: RecentBackups stores recent backup records
                items:
                  description: BackupRecord stores information about a single backup
                    execution
                  properties:
                    backupId:
                      description: BackupID is the unique identifier for this backup
                      type: string
                    completionTime:
                      description: CompletionTime when backup completed (nil if still
                        running)
                      format: date-time
                      type: string
                    error:
                      description: Error message if failed
                      type: string
                    startTime:
                      description: StartTime when backup started
                      format: date-time
                      type: string
                    status:
                      description: 'Status of this backup: Running, Completed, Failed'
                      type: string
                    tables:
                      description: Tables that were backed up
                      items:
                        type: string
                      type: array
                  required:
                  - backupId
                  - startTime
                  - status
                  type: object
                type: array
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
