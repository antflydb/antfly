apiVersion: v1
kind: Namespace
metadata:
  name: antfly-gke
---
apiVersion: antfly.io/v1
kind: AntflyCluster
metadata:
  name: antfly-gke-cluster
  namespace: antfly-gke
spec:
  image: ghcr.io/antflydb/antfly:latest
  imagePullPolicy: IfNotPresent

  # GKE Autopilot configuration
  gke:
    autopilot: true
    autopilotComputeClass: "Balanced"  # Options: Balanced, autopilot-spot, Performance, Scale-Out, Accelerator
    podDisruptionBudget:
      enabled: true
      maxUnavailable: 1

  metadataNodes:
    replicas: 3
    # Do NOT use useSpotPods with Autopilot - use autopilotComputeClass instead
    metadataAPI: {}
    metadataRaft: {}
    resources:
      cpu: "500m"
      memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"

  dataNodes:
    replicas: 3
    # Do NOT use useSpotPods with Autopilot - use autopilotComputeClass instead
    api: {}
    raft: {}
    resources:
      cpu: "1000m"
      memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"

  storage:
    # GKE Autopilot uses standard-rwo as default storage class
    storageClass: "standard-rwo"
    metadataStorage: "1Gi"
    dataStorage: "10Gi"

  config: |
    {
      "log": {
        "level": "info",
        "style": "json"
      },
      "cache_size": 1000,
      "enable_metrics": true,
      "max_shard_size_bytes": 134217728,
      "raft_snapshot_threshold": 10000
    }
