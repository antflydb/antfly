apiVersion: v1
kind: Secret
metadata:
  name: antfly-proxy-bearer-tokens
  namespace: default
type: Opaque
stringData:
  bearer_tokens.json: |
    {
      "token-1": {
        "subject": "user-1",
        "tenant": "tenant-a",
        "admin": false,
        "tables": ["docs"],
        "operations": ["read"]
      },
      "token-2": {
        "subject": "writer-1",
        "tenant": "tenant-a",
        "admin": false,
        "tables": ["docs"],
        "operations": ["write"]
      }
    }
