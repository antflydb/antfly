# Example: AntflyCluster with S3/GCS backup credentials using envFrom
#
# This example shows how to inject backup credentials into the cluster pods
# using the envFrom field. The secret should contain AWS SDK compatible keys.
#
# IMPORTANT: Create the secret BEFORE applying the cluster:
#   kubectl create secret generic backup-credentials \
#     --from-literal=AWS_ACCESS_KEY_ID='your-access-key' \
#     --from-literal=AWS_SECRET_ACCESS_KEY='your-secret-key' \
#     --from-literal=AWS_ENDPOINT_URL='https://storage.googleapis.com' \
#     --from-literal=AWS_REGION='us-central1'
#
# Secret rotation: Pods must be restarted to pick up secret changes:
#   kubectl rollout restart statefulset/antfly-backup-cluster-metadata -n default
#   kubectl rollout restart statefulset/antfly-backup-cluster-data -n default
#
# The operator will automatically trigger rolling updates when secret data changes
# by computing a hash of the secret contents and adding it as a pod annotation.
---
apiVersion: v1
kind: Secret
metadata:
  name: backup-credentials
  namespace: default
type: Opaque
stringData:
  # AWS SDK compatible keys for S3/GCS backup
  AWS_ACCESS_KEY_ID: "GOOG1EEXAMPLEKEY"
  AWS_SECRET_ACCESS_KEY: "your-secret-access-key-here"
  # For GCS, use the S3-compatible endpoint
  AWS_ENDPOINT_URL: "https://storage.googleapis.com"
  AWS_REGION: "us-central1"
---
apiVersion: antfly.io/v1
kind: AntflyCluster
metadata:
  name: antfly-backup-cluster
  namespace: default
spec:
  image: ghcr.io/antflydb/antfly:latest
  imagePullPolicy: IfNotPresent

  # Metadata nodes with backup credentials
  metadataNodes:
    replicas: 3
    metadataAPI:
      port: 12377
    metadataRaft:
      port: 9017
    resources:
      cpu: "500m"
      memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    # Inject backup credentials from secret
    envFrom:
      - secretRef:
          name: backup-credentials

  # Data nodes with backup credentials
  dataNodes:
    replicas: 3
    api:
      port: 12380
    raft:
      port: 9021
    resources:
      cpu: "1000m"
      memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    # Inject backup credentials from secret
    envFrom:
      - secretRef:
          name: backup-credentials

  storage:
    storageClass: "standard"
    metadataStorage: "1Gi"
    dataStorage: "10Gi"

  # S3 backup configuration
  config: |
    {
      "log": {
        "level": "info",
        "style": "json"
      },
      "storage": {
        "s3": {
          "endpoint": "storage.googleapis.com",
          "bucket": "my-antfly-backups",
          "prefix": "cluster-1/"
        }
      },
      "max_shard_size_bytes": 134217728,
      "enable_metrics": true
    }
---
# Alternative: Using prefix to namespace environment variables
# Useful when you need to avoid collisions with other env vars
apiVersion: antfly.io/v1
kind: AntflyCluster
metadata:
  name: antfly-backup-prefixed
  namespace: default
spec:
  image: ghcr.io/antflydb/antfly:latest
  imagePullPolicy: IfNotPresent

  metadataNodes:
    replicas: 3
    metadataAPI: {}
    metadataRaft: {}
    resources:
      cpu: "500m"
      memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    # Using prefix - vars become BACKUP_AWS_ACCESS_KEY_ID, etc.
    envFrom:
      - secretRef:
          name: backup-credentials
        prefix: "BACKUP_"

  dataNodes:
    replicas: 3
    api: {}
    raft: {}
    resources:
      cpu: "1000m"
      memory: "2Gi"
      limits:
        cpu: "2000m"
        memory: "4Gi"
    envFrom:
      - secretRef:
          name: backup-credentials
        prefix: "BACKUP_"

  storage:
    storageClass: "standard"
    metadataStorage: "1Gi"
    dataStorage: "10Gi"

  config: |
    {
      "log": {
        "level": "info",
        "style": "json"
      }
    }
