# Antfly Configuration with S3 Storage (MinIO)
# This configuration demonstrates using MinIO as S3-compatible object storage
# for Pebble sstables, enabling fast shard splits and migrations.

# Metadata server configuration
metadata:
  orchestration_urls:
    1: "http://127.0.0.1:12377"

# Cluster settings
replication_factor: 1
max_shards_per_table: 4

# Logging configuration
log_level: "debug"
logging_style: "terminal"  # Use "json" for production

# S3 Storage Configuration for Pebble sstables
s3:
  enabled: true
  endpoint: "minio:9000"           # MinIO service endpoint
  region: "us-east-1"              # MinIO default region
  bucket: "antfly-data"            # Bucket created by minio-setup service
  prefix: "sstables"               # Prefix for organizing sstables in bucket
  use_ssl: false                   # false for local MinIO, true for AWS S3

  # Access credentials are provided via environment variables:
  # AWS_ACCESS_KEY_ID=minioadmin
  # AWS_SECRET_ACCESS_KEY=minioadmin
  # (Set in docker-compose.yml)

# How S3 Storage Works:
# ====================
#
# With S3 enabled, Pebble stores sstables in MinIO instead of local disk:
#
# 1. Leader-Only Writes:
#    - Only the Raft leader writes new sstables to S3
#    - Followers read from S3 (foreign objects)
#    - Prevents 3x storage cost from replica writes
#
# 2. Shard Splits (100-1000x faster):
#    - Checkpoint creates references to S3 sstables (no copy!)
#    - Only MANIFEST/WAL copied (~10MB instead of 10GB)
#    - Both shards share same S3 objects initially
#    - Compaction gradually creates shard-specific sstables
#
# 3. Shard Migrations (30-60x faster):
#    - Transfer only metadata (~10MB) to new node
#    - New node accesses same S3 bucket directly
#    - No large data transfers needed
#
# 4. Storage Efficiency:
#    - No data duplication during splits
#    - 50% savings vs local storage during operations
#    - Reference markers track object usage
#    - Automatic garbage collection
#
# 5. Cost Analysis (example 1TB database):
#    - Traditional: 2TB local SSD needed = $200/month
#    - With S3: 1TB S3 + 5GB local = $33.50/month
#    - Savings: 83%
#
# For Production AWS S3:
# ======================
# Change these settings:
#   endpoint: "s3.amazonaws.com"  # or regional endpoint
#   use_ssl: true
#   region: "us-west-2"  # your AWS region
#
# Set environment variables:
#   AWS_ACCESS_KEY_ID=<your-key>
#   AWS_SECRET_ACCESS_KEY=<your-secret>
#
# Advanced Configuration:
# =======================
# You can also use remote.CreateOnSharedLower instead of CreateOnSharedAll
# to keep hot data (L0-L4) local and only put cold data (L5-L6) in S3.
# This is configured in code (src/store/db.go) and provides:
#   - Lower latency for recent data
#   - Reduced S3 GET requests
#   - Still get most split/migration benefits (75% of data in S3)
#
# Block Cache Tuning:
# ===================
# With S3 storage, increase Pebble's block cache for better performance.
# Default: 320MB (in code)
# Recommended: 2GB+ depending on workload and available RAM
#
# See docs/s3-storage-shard-operations.md for detailed architecture
